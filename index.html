<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World Window Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(20, 20, 40, 0.8);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .app-title { font-size: 22px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
  .mode-tab {
    padding: 10px 22px; border-radius: 8px; border: none; background: transparent;
    color: #aaa; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
  }
  .mode-tab.active { background: #fff; color: #000; }

  /* Main content */
  .content { flex: 1; position: relative; background: #000; }

  /* Camera */
  .camera-container { width: 100%; height: 100%; }
  .camera-container iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

  /* News - さらに巨大化 */
  .news-container {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    padding: 60px 40px; overflow-y: auto; justify-content: center;
  }
  .news-source { font-size: 20px; color: #5ba8f5; margin-bottom: 15px; font-weight: 600; }
  .news-title { font-size: 64px; font-weight: 800; line-height: 1.2; margin-bottom: 30px; color: #fff; }
  .news-description { font-size: 36px; line-height: 1.6; color: #ccc; margin-bottom: 40px; }
  .news-link { font-size: 22px; color: #5ba8f5; text-decoration: none; border-bottom: 2px solid; padding-bottom: 4px; align-self: flex-start; }

  /* Footer - 操作性重視 */
  footer {
    padding: 25px 40px 35px;
    background: #121225;
    border-top: 1px solid rgba(255,255,255,0.15);
    z-index: 100;
  }
  .location-info { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
  .location-name { font-size: 24px; font-weight: 700; color: #fff; }
  .location-time { font-size: 22px; color: #888; font-variant-numeric: tabular-nums; }
  
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
  .progress-fill { height: 100%; background: #5ba8f5; transition: width 1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 60px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
  }
  .ctrl-btn:active { background: #5ba8f5; transform: scale(0.9); }
  .ctrl-btn.main-next { width: 90px; height: 90px; background: #5ba8f5; font-size: 40px; }

  .fade-enter { animation: fadeIn 0.6s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="camera" onclick="switchMode('camera')">Camera</button>
    <button class="mode-tab" data-mode="news" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content" id="content"></div>

<footer>
  <div class="location-info">
    <span class="location-name" id="locationName">Loading...</span>
    <span class="location-time" id="locationTime"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
</footer>

<script>
// 2026年3月時点の有効なライブカメラID（定期的に確認が必要です）
const cameras = [
  { city: "Shibuya, Tokyo", tz: "Asia/Tokyo", flag: "🇯🇵", videoId: "mN6S_4pXoXs" },
  { city: "Times Square, NY", tz: "America/New_York", flag: "🇺🇸", videoId: "1-iS7LArMPA" },
  { city: "London, UK", tz: "Europe/London", flag: "🇬🇧", videoId: "Zaem36S0UJQ" },
  { city: "Venice, Italy", tz: "Europe/Rome", flag: "🇮🇹", videoId: "hpYI6PInW5U" },
  { city: "Seoul, Korea", tz: "Asia/Seoul", flag: "🇰🇷", videoId: "v_7O77x5W-I" },
  { city: "Bangkok, Thailand", tz: "Asia/Bangkok", flag: "🇹🇭", videoId: "6_8YqXwL7fM" }
];

const newsFeeds = [
  { name: "BBC News", url: "https://feeds.bbci.co.uk/news/world/rss.xml" },
  { name: "NHK World", url: "https://www3.nhk.or.jp/rss/news/cat0.xml" },
  { name: "Reuters", url: "https://www.reutersagency.com/feed/?best-topics=world-news" }
];

let currentMode = 'camera', currentIndex = 0, isPaused = false, progressPercent = 0;
let shuffledCameras = [], cachedNews = [], newsIndex = 0;
const CAMERA_INTERVAL = 60, NEWS_INTERVAL = 30;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showCamera() {
  if (!shuffledCameras.length) shuffledCameras = shuffle(cameras);
  const cam = shuffledCameras[currentIndex % shuffledCameras.length];
  document.getElementById('content').innerHTML = `
    <div class="camera-container fade-enter">
      <iframe src="https://www.youtube.com/embed/${cam.videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0" allow="autoplay; encrypted-media"></iframe>
    </div>`;
  document.getElementById('locationName').textContent = `${cam.flag} ${cam.city}`;
  updateTime(cam.tz);
}

const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
async function loadNewsPool() {
  document.getElementById('content').innerHTML = `<div style="display:flex;height:100%;align-items:center;justify-content:center;font-size:30px">Fetching News...</div>`;
  const results = await Promise.all(newsFeeds.map(f => fetch(RSS_PROXY + encodeURIComponent(f.url)).then(r => r.json())));
  cachedNews = shuffle(results.flatMap(r => r.items || []));
  showNewsItem();
}

function showNewsItem() {
  const item = cachedNews[newsIndex % cachedNews.length];
  const desc = (item.description || "").replace(/<[^>]*>/g, '').substring(0, 250) + "...";
  document.getElementById('content').innerHTML = `
    <div class="news-container fade-enter">
      <div class="news-source">Latest from World News</div>
      <h1 class="news-title">${item.title}</h1>
      <p class="news-description">${desc}</p>
      <a class="news-link" href="${item.link}" target="_blank">Read Article</a>
    </div>`;
  document.getElementById('locationName').textContent = "🌍 World News";
}

function goNext() {
  if (currentMode === 'camera') { currentIndex++; showCamera(); }
  else { newsIndex++; showNewsItem(); }
  resetProgress();
}

function goPrev() {
  if (currentMode === 'camera') { currentIndex--; showCamera(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
  resetProgress();
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  mode === 'camera' ? showCamera() : loadNewsPool();
  resetProgress();
}

function updateTime(tz) {
  document.getElementById('locationTime').textContent = new Date().toLocaleTimeString('ja-JP', { timeZone: tz, hour: '2-digit', minute: '2-digit' });
}

function resetProgress() { progressPercent = 0; document.getElementById('progressFill').style.width = '0%'; }

setInterval(() => {
  if (isPaused) return;
  const interval = currentMode === 'camera' ? CAMERA_INTERVAL : NEWS_INTERVAL;
  progressPercent += (100 / interval);
  document.getElementById('progressFill').style.width = Math.min(progressPercent, 100) + '%';
  if (progressPercent >= 100) goNext();
}, 1000);

shuffledCameras = shuffle(cameras);
showCamera();
</script>
</body>
</html>
