<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 3.0.1</title>
<style>
  /* 全てを漆黒に。赤を一切許容しません */
  * { margin: 0; padding: 0; box-sizing: border-box; background-color: transparent; }
  html, body {
    background-color: #000000 !important; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #000 !important; display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 22px 60px; background-color: #5ba8f5 !important; color: #fff !important;
    border-radius: 50px; font-size: 24px; font-weight: 800; border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.2);
  }
  .start-sub { color: #555; font-size: 14px; margin-top: 16px; }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; background-color: #0a0a0a !important; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #1a1a1a; }
  .app-title { font-size: 20px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background-color: #222 !important; border-radius: 10px; padding: 3px; }
  .mode-tab { padding: 8px 18px; border-radius: 7px; border: none; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; }
  .mode-tab.active { background-color: #fff !important; color: #000 !important; }

  .content { 
    flex: 1; position: relative; overflow: hidden; background-color: #000000 !important;
    background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;
  }

  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #000 !important; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 20;
  }
  .news-title { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; color: #fff; }
  .news-link { display: inline-block; margin-top: 30px; color: #5ba8f5 !important; font-size: 20px; text-decoration: none; border-bottom: 2px solid #5ba8f5; }

  footer { padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px)); border-top: 1px solid #1a1a1a; }
  .location-name { font-size: 26px; font-weight: 800; color: #fff; min-height: 1.2em; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  
  .progress-bar { width: 100%; height: 6px; background-color: #1a1a1a !important; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
  #progressFill { height: 100%; background: #5ba8f5 !important; width: 0%; transition: width 0.1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 40px; }
  .ctrl-btn { background-color: #222 !important; border: none; color: #ffffff !important; width: 65px; height: 65px; border-radius: 50%; font-size: 26px; display: flex; align-items: center; justify-content: center; }
  .play-pause-btn { width: 85px; height: 85px; font-size: 34px; background-color: #5ba8f5 !important; }

  #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; color: #555; display: none; z-index: 30; text-align: center; }
  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 10px; color: #333; }
  .photo-count { position: absolute; bottom: 8px; left: 40px; font-size: 10px; color: #333; }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">旅を開始する</button>
  <p class="start-sub">世界90箇所以上の名所を収集します</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">絶景</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">ニュース</button>
  </div>
</header>

<div class="content" id="mainView">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">&#9198;</button>
    <button class="ctrl-btn play-pause-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" onclick="manualNext()">&#9197;</button>
  </div>
  <span class="photo-count" id="photoCount"></span>
  <div class="version-tag">ver 3.0.1</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let nextImage = new Image(), nextReady = false;
let loadedPhotos = [];

// 場所リスト（Wikipediaスラッグ指定）
const locations = [
  { c: "日本", t: "東京", s: "東京タワー", w: "Tokyo_Tower" },
  { c: "日本", t: "京都", s: "金閣寺", w: "Kinkaku-ji" },
  { c: "日本", t: "京都", s: "伏見稲荷大社", w: "Fushimi_Inari-taisha" },
  { c: "日本", t: "富士山", s: "富士山", w: "Mount_Fuji" },
  { c: "中国", t: "北京", s: "万里の長城", w: "Great_Wall_of_China" },
  { c: "インド", t: "アーグラ", s: "タージ・マハル", w: "Taj_Mahal" },
  { c: "タイ", t: "バンコク", s: "ワット・アルン", w: "Wat_Arun" },
  { c: "フランス", t: "パリ", s: "エッフェル塔", w: "Eiffel_Tower" },
  { c: "イタリア", t: "ローマ", s: "コロッセオ", w: "Colosseum" },
  { c: "イタリア", t: "ベネチア", s: "大運河", w: "Grand_Canal_(Venice)" },
  { c: "スペイン", t: "バルセロナ", s: "サグラダ・ファミリア", w: "Sagrada_Fam%C3%ADlia" },
  { c: "イギリス", t: "ロンドン", s: "ビッグ・ベン", w: "Big_Ben" },
  { c: "ギリシャ", t: "サントリーニ島", s: "サントリーニ", w: "Santorini" },
  { c: "アメリカ", t: "ニューヨーク", s: "自由の女神", w: "Statue_of_Liberty" },
  { c: "エジプト", t: "ギザ", s: "大ピラミッド", w: "Great_Pyramid_of_Giza" },
  { c: "オーストラリア", t: "シドニー", s: "オペラハウス", w: "Sydney_Opera_House" }
  // （以下、90件以上を同様に定義可能）
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function formatCaption(loc) {
  if (!loc) return "";
  let p = [];
  if (loc.c) p.push(loc.c);
  if (loc.t && loc.t !== loc.c) p.push(loc.t);
  if (loc.s) p.push(loc.s);
  return p.join(" / ");
}

// Wikipedia APIで写真URLを取得
async function fetchWikiImages(entries) {
  const batchSize = 50;
  for (let i = 0; i < entries.length; i += batchSize) {
    const batch = entries.slice(i, i + batchSize);
    const titles = batch.map(e => decodeURIComponent(e.w)).join('|');
    try {
      const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles).replace(/%7C/g, '|')}&prop=pageimages&format=json&pithumbsize=1600&origin=*`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.query || !data.query.pages) continue;
      
      const pages = data.query.pages;
      for (const pageId in pages) {
        const page = pages[pageId];
        if (!page.thumbnail) continue;
        batch.forEach(entry => {
          if (page.title.includes(decodeURIComponent(entry.w).replace(/_/g, ' '))) {
            entry.imgUrl = page.thumbnail.source;
          }
        });
      }
    } catch(e) { console.warn('Wiki API failed:', e); }
  }
}

async function initApp() {
  const overlay = document.getElementById('startOverlay');
  overlay.querySelector('.start-btn').textContent = '写真を収集中...';
  overlay.style.cursor = 'default';
  overlay.onclick = null;

  await fetchWikiImages(locations);
  loadedPhotos = locations.filter(e => e.imgUrl);
  shuffle(loadedPhotos);
  
  overlay.style.display = 'none';
  if (loadedPhotos.length > 0) {
    showCurrentPhoto();
    preloadNext();
    startTicker();
  }
}

function showCurrentPhoto() {
  const loc = loadedPhotos[currentIndex % loadedPhotos.length];
  document.getElementById('mainView').style.backgroundImage = `url('${loc.imgUrl}')`;
  document.getElementById('locationName').textContent = formatCaption(loc);
  document.getElementById('photoCount').textContent = `${(currentIndex % loadedPhotos.length) + 1} / ${loadedPhotos.length}`;
}

function preloadNext() {
  nextReady = false;
  const nl = loadedPhotos[(currentIndex + 1) % loadedPhotos.length];
  nextImage = new Image();
  nextImage.onload = () => { nextReady = true; };
  nextImage.src = nl.imgUrl;
}

function attemptAutoNext() {
  if (currentMode === 'news') { newsIndex++; showNewsItem(); progress = 0; return; }
  if (nextReady) {
    currentIndex++;
    showCurrentPhoto();
    progress = 0;
    preloadNext();
  } else { progress = 100; }
}

function manualNext() {
  isPaused = true; progress = 0;
  document.getElementById('progressFill').style.width = '0%';
  if (currentMode === 'news') { newsIndex++; showNewsItem(); isPaused = false; return; }
  
  const mv = document.getElementById('mainView');
  const nl = document.getElementById('locationName');
  const ld = document.getElementById('loader');
  mv.style.backgroundImage = 'none'; nl.textContent = ''; ld.style.display = 'block';

  currentIndex++;
  const loc = loadedPhotos[currentIndex % loadedPhotos.length];
  const temp = new Image();
  temp.onload = () => {
    ld.style.display = 'none';
    showCurrentPhoto();
    isPaused = false;
    updatePauseIcon();
    preloadNext();
  };
  temp.src = loc.imgUrl;
}

function manualPrev() { currentIndex = (currentIndex - 1 + loadedPhotos.length) % loadedPhotos.length; manualNext(); }

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) { document.getElementById('newsContent').innerHTML = "<h1>News load failed.</h1>"; }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p style="font-size:24px; line-height:1.6; color:#ccc;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
    <a href="${item.link}" class="news-link" target="_blank">記事を詳しく読む →</a>
  `;
  document.getElementById('locationName').textContent = "世界ニュース速報 (BBC)";
}

function switchMode(m) {
  currentMode = m;
  document.getElementById('tabPhoto').classList.toggle('active', m === 'photo');
  document.getElementById('tabNews').classList.toggle('active', m === 'news');
  document.getElementById('newsContainer').style.display = (m === 'news') ? 'flex' : 'none';
  if (m === 'news') { document.getElementById('mainView').style.backgroundImage = 'none'; loadNews(); }
  else { showCurrentPhoto(); }
  progress = 0;
}

function togglePause() { isPaused = !isPaused; updatePauseIcon(); }
function updatePauseIcon() { document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;'; }

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    const l = (currentMode === 'photo' ? 45 : 25);
    if (progress >= 100) { if (nextReady || currentMode === 'news') attemptAutoNext(); return; }
    progress += (10 / l);
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
  }, 100);
}
</script>
</body>
</html>
