<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100vh; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    padding-top: calc(10px + env(safe-area-inset-top, 0px));
    background: rgba(255,255,255,0.05);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  .app-title { font-size: 18px; font-weight: 600; }
  .mode-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 6px; border: none;
    background: transparent; color: #999; font-size: 14px;
    font-weight: 500; cursor: pointer;
  }
  .mode-tab.active { background: rgba(255,255,255,0.15); color: #fff; }

  .content {
    flex: 1; position: relative; overflow: hidden; z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }

  .camera-view {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; position: relative;
  }
  .camera-view iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border: none;
    pointer-events: none;
  }
  .camera-info {
    position: relative; z-index: 10;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 12px 24px; border-radius: 8px;
    font-size: 20px; text-align: center;
  }

  .news-container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 24px; padding-bottom: 80px;
    overflow-y: auto;
  }
  .news-source { font-size: 32px; color: #888; margin-bottom: 6px; text-transform: uppercase; }
  .news-title { font-size: 64px; font-weight: 700; line-height: 1.35; margin-bottom: 16px; color: #fff; }
  .news-description { font-size: 44px; line-height: 1.6; color: #bbb; margin-bottom: 20px; }
  .news-meta { font-size: 32px; color: #666; }
  .news-link { display: inline-block; margin-top: 16px; color: #5ba8f5; text-decoration: none; font-size: 36px; }

  footer {
    padding: 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: rgba(255,255,255,0.05);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  .location-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; min-height: 28px; }
  .location-name { font-size: 18px; font-weight: 600; }
  .location-time { font-size: 16px; color: #888; }
  .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #5ba8f5, #a78bfa); border-radius: 2px; transition: width 1s linear; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.08); border: none; color: #ccc;
    height: 40px; border-radius: 20px; font-size: 15px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; padding: 0 20px; gap: 6px;
    -webkit-tap-highlight-color: rgba(255,255,255,0.2);
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.2); }
  .ctrl-btn.round { width: 40px; padding: 0; }

  .version-tag {
    position: fixed; top: 50px; right: 10px;
    background: red; color: white; padding: 4px 10px;
    font-size: 14px; font-weight: bold; border-radius: 4px;
    z-index: 9999;
  }
</style>
</head>
<body>

<div class="version-tag">V8</div>

<header>
  <div><span class="app-title">World Window</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabCamera" onclick="switchMode('camera')">Camera</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content" id="content">
  <div style="color:#555;font-size:20px;">Loading...</div>
</div>

<footer>
  <div class="location-info">
    <span class="location-name" id="locationName">Starting...</span>
    <span class="location-time" id="locationTime"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">Prev</button>
    <button class="ctrl-btn round" id="pauseBtn" onclick="togglePause()">||</button>
    <button class="ctrl-btn" onclick="goNext()">Next</button>
  </div>
</footer>

<script>
var cameras = [
  { city: "Shibuya, Tokyo", tz: "Asia/Tokyo", flag: "JP", vid: "live_stream?channel=UCgdHxnHSXvcAi4PaMIY1Ltg" },
  { city: "Shinjuku, Tokyo", tz: "Asia/Tokyo", flag: "JP", vid: "live_stream?channel=UCMxNcaFBLSXEhAIZKMDXbCw" },
  { city: "Akihabara, Tokyo", tz: "Asia/Tokyo", flag: "JP", vid: "live_stream?channel=UC8bRCo7lGBfPsfzmIJ4bm9A" },
  { city: "Seoul, Korea", tz: "Asia/Seoul", flag: "KR", vid: "live_stream?channel=UCQ2O-08tY-GeWaSxxjEKNMQ" },
  { city: "Busan, Korea", tz: "Asia/Seoul", flag: "KR", vid: "bSkAqlbkjKs" },
  { city: "Bangkok", tz: "Asia/Bangkok", flag: "TH", vid: "RRzgtJBueMk" },
  { city: "Singapore", tz: "Asia/Singapore", flag: "SG", vid: "M0g5HdRmFCQ" },
  { city: "Dubai", tz: "Asia/Dubai", flag: "AE", vid: "5WfiTHiU6FI" },
  { city: "London", tz: "Europe/London", flag: "GB", vid: "Zaem36S0UJQ" },
  { city: "Paris", tz: "Europe/Paris", flag: "FR", vid: "cXkFOYOlAzE" },
  { city: "Rome", tz: "Europe/Rome", flag: "IT", vid: "L6aCnVIePJE" },
  { city: "Amsterdam", tz: "Europe/Amsterdam", flag: "NL", vid: "1Hs0dGRBEMo" },
  { city: "Prague", tz: "Europe/Prague", flag: "CZ", vid: "GQzTVAiMhoI" },
  { city: "Istanbul", tz: "Europe/Istanbul", flag: "TR", vid: "x6x6GnXrXhg" },
  { city: "New York", tz: "America/New_York", flag: "US", vid: "live_stream?channel=UC6qrG3W8SMK0jior2olka3g" },
  { city: "Miami Beach", tz: "America/New_York", flag: "US", vid: "VHW_sF3BKFI" },
  { city: "Los Angeles", tz: "America/Los_Angeles", flag: "US", vid: "vCadcBR95oU" },
  { city: "Havana", tz: "America/Havana", flag: "CU", vid: "jPOdsautHbo" },
  { city: "Buenos Aires", tz: "America/Argentina/Buenos_Aires", flag: "AR", vid: "4EGhElaZeXk" },
  { city: "Sydney", tz: "Australia/Sydney", flag: "AU", vid: "Y2gTSjoEExc" },
  { city: "Taipei", tz: "Asia/Taipei", flag: "TW", vid: "Q8SMl0bAOqo" }
];

var newsFeeds = [
  { name: "BBC News", country: "UK", flag: "GB", url: "<https://feeds.bbci.co.uk/news/world/rss.xml>" },
  { name: "Reuters", country: "Intl", flag: "INTL", url: "<https://feeds.reuters.com/reuters/worldNews>" },
  { name: "Al Jazeera", country: "Qatar", flag: "QA", url: "<https://www.aljazeera.com/xml/rss/all.xml>" },
  { name: "DW News", country: "Germany", flag: "DE", url: "<https://rss.dw.com/rdf/rss-en-world>" },
  { name: "France24", country: "France", flag: "FR", url: "<https://www.france24.com/en/rss>" },
  { name: "NHK World", country: "Japan", flag: "JP", url: "<https://www3.nhk.or.jp/rss/news/cat0.xml>" },
  { name: "The Guardian", country: "UK", flag: "GB", url: "<https://www.theguardian.com/world/rss>" }
];

var currentMode = "camera";
var currentIndex = 0;
var isPaused = false;
var progressPercent = 0;
var shuffledCameras = [];
var cachedNews = [];
var newsIndex = 0;
var CAMERA_INTERVAL = 45;
var NEWS_INTERVAL = 20;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function showCamera() {
  if (shuffledCameras.length === 0) {
    shuffledCameras = shuffle(cameras);
    currentIndex = 0;
  }
  var cam = shuffledCameras[currentIndex % shuffledCameras.length];
  var sep = cam.vid.indexOf("?") >= 0 ? "&" : "?";
  var src = "<https://www.youtube.com/embed/>" + cam.vid + sep + "autoplay=1&mute=1&controls=0&playsinline=1";

  document.getElementById("content").innerHTML =
    '<div class="camera-view">' +
      '<iframe src="' + src + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>' +
      '<div class="camera-info">' + cam.flag + " " + cam.city + '</div>' +
    '</div>';

  document.getElementById("locationName").textContent = cam.flag + " " + cam.city;
  updateTime(cam.tz);
}

function updateTime(tz) {
  try {
    document.getElementById("locationTime").textContent =
      new Date().toLocaleTimeString("en-US", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false });
  } catch(e) {}
}

var RSS_PROXY = "<https://api.rss2json.com/v1/api.json?rss_url=>";

function fetchNews() {
  var feed = newsFeeds[Math.floor(Math.random() * newsFeeds.length)];
  return fetch(RSS_PROXY + encodeURIComponent(feed.url))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "ok" && data.items && data.items.length > 0) {
        return data.items.map(function(item) {
          item.feedName = feed.name;
          item.feedCountry = feed.country;
          item.feedFlag = feed.flag;
          return item;
        });
      }
      return [];
    })
    .catch(function() { return []; });
}

function loadNews() {
  document.getElementById("content").innerHTML = '<div style="color:#555;font-size:20px;">Loading news...</div>';
  document.getElementById("locationName").textContent = "Loading...";

  Promise.all([fetchNews(), fetchNews(), fetchNews()])
    .then(function(results) {
      cachedNews = shuffle(results[0].concat(results[1]).concat(results[2]));
      newsIndex = 0;
      if (cachedNews.length > 0) { showNews(); }
      else { document.getElementById("content").innerHTML = '<div style="color:#555;font-size:20px;">No news found.</div>'; }
    });
}

function showNews() {
  if (cachedNews.length === 0) { loadNews(); return; }
  var item = cachedNews[newsIndex % cachedNews.length];

  var d = document.createElement("div");
  d.innerHTML = item.description || "";
  var desc = d.textContent || "";
  if (desc.length > 300) desc = desc.substring(0, 300) + "...";

  var date = "";
  try { if (item.pubDate) date = new Date(item.pubDate).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); } catch(e) {}

  document.getElementById("content").innerHTML =
    '<div class="news-container">' +
      '<div class="news-source">' + item.feedFlag + " " + item.feedName + " - " + item.feedCountry + '</div>' +
      '<h1 class="news-title">' + item.title + '</h1>' +
      '<p class="news-description">' + desc + '</p>' +
      '<div class="news-meta">' + date + '</div>' +
      '<a class="news-link" href="' + <item.link> + '" target="_blank">Read more</a>' +
    '</div>';

  document.getElementById("locationName").textContent = item.feedFlag + " " + item.feedName;
  document.getElementById("locationTime").textContent = date;
}

function goNext() {
  if (currentMode === "camera") {
    currentIndex = (currentIndex + 1) % shuffledCameras.length;
    showCamera();
  } else {
    newsIndex++;
    if (newsIndex >= cachedNews.length) { loadNews(); return; }
    showNews();
  }
  resetProgress();
}

function goPrev() {
  if (currentMode === "camera") {
    currentIndex = (currentIndex - 1 + shuffledCameras.length) % shuffledCameras.length;
    showCamera();
  } else {
    newsIndex = Math.max(0, newsIndex - 1);
    showNews();
  }
  resetProgress();
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById("pauseBtn").textContent = isPaused ? ">" : "||";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById("tabCamera").className = mode === "camera" ? "mode-tab active" : "mode-tab";
  document.getElementById("tabNews").className = mode === "news" ? "mode-tab active" : "mode-tab";
  if (mode === "camera") { showCamera(); } else { loadNews(); }
  resetProgress();
}

function resetProgress() {
  progressPercent = 0;
  document.getElementById("progressFill").style.width = "0%";
}

setInterval(function() {
  if (isPaused) return;
  progressPercent += 100 / (currentMode === "camera" ? CAMERA_INTERVAL : NEWS_INTERVAL);
  document.getElementById("progressFill").style.width = Math.min(progressPercent, 100) + "%";
  if (progressPercent >= 100) goNext();
  if (currentMode === "camera" && shuffledCameras.length > 0) {
    updateTime(shuffledCameras[currentIndex % shuffledCameras.length].tz);
  }
}, 1000);

shuffledCameras = shuffle(cameras);
showCamera();
</script>
</body>
</html>
