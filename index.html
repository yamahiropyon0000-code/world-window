<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.01</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 背景写真：ふわっと切り替わるアニメーション */
  #bgContainer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center;
    transition: background-image 1.2s ease-in-out;
    z-index: 1;
  }
  #bgOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.35); z-index: 2;
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(20, 20, 40, 0.8); backdrop-filter: blur(15px);
  }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; overflow: hidden; z-index: 10; }
  .news-container {
    width: 100%; height: 100%; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; background: rgba(10, 10, 26, 0.7);
    backdrop-filter: blur(10px);
  }
  .news-title { font-size: clamp(32px, 5vw, 60px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: rgba(18, 18, 37, 0.85); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.15);
  }
  .location-info { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 25px; }
  .progress-fill { height: 100%; background: #5ba8f5; width: 0%; transition: width 1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .main-next { background: #5ba8f5; }

  .version-tag {
    position: absolute; bottom: 8px; right: 100px;
    font-size: 10px; color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<div id="bgContainer"></div>
<div id="bgOverlay"></div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info">
    <span id="locationName" style="font-size:22px; font-weight:700;">Loading...</span>
  </div>
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.01</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;

const locations = [
  { name: "Paris, France", keyword: "paris,city" },
  { name: "Tokyo, Japan", keyword: "tokyo,neon" },
  { name: "Swiss Alps", keyword: "switzerland,snow" },
  { name: "New York, USA", keyword: "nyc,skyscrapers" },
  { name: "Venice, Italy", keyword: "venice,canal" },
  { name: "Kyoto, Japan", keyword: "kyoto,temple" },
  { name: "Santorini, Greece", keyword: "santorini,sea" },
  { name: "Dubai, UAE", keyword: "dubai,desert" }
];

function showPhoto() {
  const loc = locations[currentIndex % locations.length];
  const bg = document.getElementById('bgContainer');
  
  // LoremFlickrに切り替え（Unsplash Source廃止のため）
  const imgUrl = `https://loremflickr.com/1600/900/${loc.keyword}?lock=${currentIndex + 100}`;
  
  // 読み込みが完了してから表示（真っ黒になるのを防ぐ）
  const tempImg = new Image();
  tempImg.onload = function() {
    bg.style.backgroundImage = `url('${imgUrl}')`;
    document.getElementById('locationName').textContent = loc.name;
  };
  tempImg.src = imgUrl;
}

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) {
    document.getElementById('newsContent').innerHTML = "<h1>News failed to load.</h1>";
  }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p class="news-description">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
    <p style="margin-top:20px; color:#5ba8f5; font-size:18px;">BBC World News</p>
  `;
  document.getElementById('locationName').textContent = "World News";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  resetProgress();
}

function goNext() {
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
  resetProgress();
}

function goPrev() {
  if (currentMode === 'photo') { currentIndex = (currentIndex - 1 + locations.length) % locations.length; showPhoto(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
  resetProgress();
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function resetProgress() { progress = 0; }

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    progress += (100 / (currentMode === 'photo' ? 45 : 25));
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 1000);
}

showPhoto();
startTicker();
</script>
</body>
</html>
