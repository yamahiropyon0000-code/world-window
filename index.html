<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Window Pro ver 3.0.4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background-color: #000;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    background-color: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
  }

  .start-btn {
    padding: 22px 60px;
    background-color: #5ba8f5;
    color: #fff;
    border-radius: 50px;
    font-size: 24px;
    font-weight: 800;
    border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.2);
  }

  .start-sub {
    color: #555;
    font-size: 14px;
    margin-top: 16px;
  }

  header, footer {
    position: relative;
    z-index: 100;
    flex-shrink: 0;
    background-color: #0a0a0a;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    border-bottom: 1px solid #1a1a1a;
  }

  .app-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .mode-tabs {
    display: flex;
    gap: 6px;
    background-color: #222;
    border-radius: 10px;
    padding: 3px;
  }

  .mode-tab {
    padding: 8px 18px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .mode-tab.active {
    background-color: #fff;
    color: #000;
  }

  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
    background-color: #000;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .news-container {
    position: absolute;
    inset: 0;
    background-color: #000;
    display: none;
    flex-direction: column;
    padding: 60px 40px;
    justify-content: center;
    z-index: 20;
    overflow-y: auto;
  }

  .news-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 25px;
    color: #fff;
  }

  .news-desc {
    font-size: 24px;
    line-height: 1.6;
    color: #ccc;
  }

  .news-link {
    display: inline-block;
    margin-top: 30px;
    color: #5ba8f5;
    font-size: 20px;
    text-decoration: none;
    border-bottom: 2px solid #5ba8f5;
    width: fit-content;
  }

  footer {
    padding: 25px 40px;
    padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    border-top: 1px solid #1a1a1a;
  }

  .location-name {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    min-height: 1.2em;
    margin-bottom: 15px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background-color: #1a1a1a;
    border-radius: 3px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  #progressFill {
    height: 100%;
    background: #5ba8f5;
    width: 0%;
    transition: width 0.1s linear;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .ctrl-btn {
    background-color: #222;
    border: none;
    color: #fff;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .play-pause-btn {
    width: 85px;
    height: 85px;
    font-size: 34px;
    background-color: #5ba8f5;
  }

  #loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    color: #555;
    display: none;
    z-index: 30;
    text-align: center;
  }

  .version-tag {
    position: absolute;
    bottom: 8px;
    right: 120px;
    font-size: 10px;
    color: #333;
  }

  .photo-count {
    position: absolute;
    bottom: 8px;
    left: 40px;
    font-size: 10px;
    color: #333;
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">旅を開始する</button>
  <p class="start-sub">世界中の街や風景を収集します</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">絶景</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">ニュース</button>
  </div>
</header>

<div class="content" id="mainView">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">&#9198;</button>
    <button class="ctrl-btn play-pause-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" onclick="manualNext()">&#9197;</button>
  </div>
  <span class="photo-count" id="photoCount"></span>
  <div class="version-tag">ver 3.0.4</div>
</footer>

<script>
let currentMode = 'photo';
let isPaused = false;
let progress = 0;
let currentIndex = 0;
let cachedNews = [];
let newsIndex = 0;
let nextImage = new Image();
let nextReady = false;
let loadedPhotos = [];
let tickerId = null;
let newsLoaded = false;
let isFillingPool = false;

const COMMONS_API = 'https://commons.wikimedia.org/w/api.php';

const SEED_CATEGORIES = [
  'Category:Featured pictures of cityscapes',
  'Category:Cityscapes by country',
  'Category:Villages by country',
  'Category:Ports and harbours by country',
  'Category:Mountains by country',
  'Category:Lakes by country',
  'Category:Rivers by country',
  'Category:Beaches by country'
];

const els = {
  startOverlay: document.getElementById('startOverlay'),
  startBtn: document.querySelector('#startOverlay .start-btn'),
  mainView: document.getElementById('mainView'),
  locationName: document.getElementById('locationName'),
  photoCount: document.getElementById('photoCount'),
  progressFill: document.getElementById('progressFill'),
  loader: document.getElementById('loader'),
  newsContainer: document.getElementById('newsContainer'),
  newsContent: document.getElementById('newsContent'),
  pauseBtn: document.getElementById('pauseBtn'),
  tabPhoto: document.getElementById('tabPhoto'),
  tabNews: document.getElementById('tabNews')
};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function sample(array) {
  if (!array || !array.length) return null;
  return array[Math.floor(Math.random() * array.length)];
}

function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.textContent || div.innerText || '').trim();
}

function setProgress(value) {
  progress = Math.max(0, Math.min(100, value));
  els.progressFill.style.width = progress + '%';
}

function setPhotoBackground(url) {
  els.mainView.style.backgroundImage = url ? `url("${url}")` : 'none';
}

function getCurrentPhoto() {
  if (!loadedPhotos.length) return null;
  return loadedPhotos[currentIndex % loadedPhotos.length];
}

function updatePhotoCounter() {
  if (currentMode === 'news') {
    els.photoCount.textContent = cachedNews.length
      ? `${((newsIndex % cachedNews.length) + cachedNews.length) % cachedNews.length + 1} / ${cachedNews.length}`
      : '0 / 0';
    return;
  }

  els.photoCount.textContent = loadedPhotos.length
    ? `${(currentIndex % loadedPhotos.length) + 1} / ${loadedPhotos.length}`
    : '0 / 0';
}

function cleanFileTitle(title) {
  return decodeURIComponent(
    (title || '')
      .replace(/^File:/i, '')
      .replace(/\.[a-z0-9]{2,5}$/i, '')
      .replace(/[_]+/g, ' ')
  ).trim();
}

function shortenText(text, maxLen = 110) {
  const s = (text || '').replace(/\s+/g, ' ').trim();
  if (!s) return '';
  return s.length > maxLen ? s.slice(0, maxLen) + '…' : s;
}

function buildCaption(item) {
  if (!item) return '';
  if (item.captionJa) return item.captionJa;
  if (item.caption) return item.caption;

  const parts = [];
  if (item.place) parts.push(item.place);
  if (item.theme) parts.push(item.theme);
  if (item.titleClean) parts.push(item.titleClean);
  return parts.join(' / ');
}

async function apiFetch(params) {
  const url = new URL(COMMONS_API);
  Object.entries({
    action: 'query',
    format: 'json',
    origin: '*',
    ...params
  }).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchCategoryMembers(categoryTitle, type = 'subcat', limit = 40) {
  const data = await apiFetch({
    list: 'categorymembers',
    cmtitle: categoryTitle,
    cmtype: type,
    cmlimit: String(limit)
  });
  return data?.query?.categorymembers || [];
}

async function pickCategoryWithFiles(seedCategory) {
  let current = seedCategory;

  for (let depth = 0; depth < 3; depth++) {
    let files = [];
    try {
      files = await fetchCategoryMembers(current, 'file', 30);
    } catch (_) {}

    if (files.length >= 8) return current;

    let subcats = [];
    try {
      subcats = await fetchCategoryMembers(current, 'subcat', 60);
    } catch (_) {}

    if (!subcats.length) return current;
    current = sample(subcats).title;
  }

  return current;
}

async function fetchFileInfo(fileTitles) {
  if (!fileTitles.length) return [];

  const chunks = [];
  for (let i = 0; i < fileTitles.length; i += 20) {
    chunks.push(fileTitles.slice(i, i + 20));
  }

  const all = [];
  for (const chunk of chunks) {
    const data = await apiFetch({
      prop: 'imageinfo|categories',
      titles: chunk.join('|'),
      iiprop: 'url|extmetadata|size|mime',
      iiurlwidth: '1600',
      cllimit: '20'
    });

    const pages = data?.query?.pages || {};
    for (const pageId in pages) {
      all.push(pages[pageId]);
    }
  }

  return all;
}

function categoryText(page) {
  return (page.categories || [])
    .map(c => (c.title || '').replace(/^Category:/i, ''))
    .join(' | ')
    .toLowerCase();
}

function looksLikeBadImage(page) {
  const ii = page.imageinfo?.[0];
  if (!ii) return true;

  const title = (page.title || '').toLowerCase();
  const mime = (ii.mime || '').toLowerCase();
  const cats = categoryText(page);
  const desc = (
    stripHtml(ii.extmetadata?.ImageDescription?.value || '') + ' ' +
    stripHtml(ii.extmetadata?.ObjectName?.value || '')
  ).toLowerCase();

  if (!mime.startsWith('image/')) return true;
  if (mime.includes('svg')) return true;
  if ((ii.width || 0) < 900 || (ii.height || 0) < 600) return true;

  const badWords = [
    'logo', 'flag', 'map', 'locator', 'route map', 'diagram', 'chart', 'symbol',
    'seal', 'crest', 'coat of arms', 'icon', 'poster', 'stamp', 'banknote',
    'drawing', 'painting', 'illustration', 'etching', 'engraving', 'sketch',
    'portrait', 'passport', 'document', 'signature', 'currency', 'emblem'
  ];

  for (const word of badWords) {
    if (title.includes(word) || cats.includes(word) || desc.includes(word)) {
      return true;
    }
  }

  const goodWords = [
    'cityscape', 'street', 'streetscape', 'village', 'town', 'harbour', 'harbor',
    'port', 'lake', 'river', 'mountain', 'beach', 'forest', 'skyline',
    'panorama', 'landscape', 'old town', 'alley', 'coast', 'canal'
  ];

  for (const word of goodWords) {
    if (title.includes(word) || cats.includes(word) || desc.includes(word)) {
      return false;
    }
  }

  if (mime === 'image/jpeg' && (ii.width || 0) >= 1400) return false;

  return true;
}

function extractPlace(page) {
  const cats = (page.categories || []).map(c => c.title.replace(/^Category:/i, ''));
  const preferred = cats.find(c =>
    / in | of | by country| cityscapes| villages| harbours| harbors| ports| mountains| lakes| rivers| beaches/i.test(c)
  );
  return preferred || '';
}

function extractTheme(page) {
  const text = categoryText(page);
  if (text.includes('cityscape')) return '街並み';
  if (text.includes('street')) return '通り';
  if (text.includes('village')) return '村';
  if (text.includes('harbour') || text.includes('harbor') || text.includes('port')) return '港';
  if (text.includes('mountain')) return '山の風景';
  if (text.includes('lake')) return '湖';
  if (text.includes('river')) return '川辺';
  if (text.includes('beach')) return '海辺';
  if (text.includes('forest')) return '森';
  if (text.includes('landscape')) return '風景';
  return '世界の風景';
}

function pageToPhotoItem(page) {
  const ii = page.imageinfo?.[0];
  if (!ii?.thumburl) return null;

  const titleClean = cleanFileTitle(page.title);
  const rawDesc =
    stripHtml(ii.extmetadata?.ObjectName?.value || '') ||
    stripHtml(ii.extmetadata?.ImageDescription?.value || '');

  const place = extractPlace(page);
  const theme = extractTheme(page);

  const captionParts = [];
  if (place) captionParts.push(shortenText(place.replace(/\s*\([^)]*\)\s*/g, ''), 70));
  if (theme) captionParts.push(theme);
  if (rawDesc) captionParts.push(shortenText(rawDesc, 80));
  else if (titleClean) captionParts.push(shortenText(titleClean, 80));

  return {
    id: page.title,
    imgUrl: ii.thumburl,
    fullUrl: ii.descriptionurl || '',
    titleClean,
    caption: captionParts.join(' / '),
    place: shortenText(place.replace(/\s*\([^)]*\)\s*/g, ''), 70),
    theme
  };
}

async function loadCategoryBatch(seedCategory) {
  const chosenCategory = await pickCategoryWithFiles(seedCategory);
  const fileMembers = await fetchCategoryMembers(chosenCategory, 'file', 30);

  if (!fileMembers.length) return [];

  shuffle(fileMembers);
  const picked = fileMembers.slice(0, 18).map(f => f.title);
  const pages = await fetchFileInfo(picked);

  return pages
    .filter(page => !looksLikeBadImage(page))
    .map(pageToPhotoItem)
    .filter(Boolean);
}

async function fillImagePool(targetCount = 60) {
  if (isFillingPool) return;
  if (loadedPhotos.length >= targetCount) return;

  isFillingPool = true;
  try {
    const seen = new Set(loadedPhotos.map(p => p.id));
    let safety = 0;

    while (loadedPhotos.length < targetCount && safety < 14) {
      safety++;
      const seed = sample(SEED_CATEGORIES);
      let items = [];

      try {
        items = await loadCategoryBatch(seed);
      } catch (e) {
        console.warn('Category batch failed:', seed, e);
      }

      for (const item of items) {
        if (!seen.has(item.id)) {
          seen.add(item.id);
          loadedPhotos.push(item);
        }
      }
    }
  } finally {
    isFillingPool = false;
  }
}

async function initApp() {
  els.startBtn.textContent = '収集中...';
  els.startOverlay.style.cursor = 'default';
  els.startOverlay.onclick = null;

  await fillImagePool(70);
  shuffle(loadedPhotos);

  els.startOverlay.style.display = 'none';

  if (!loadedPhotos.length) {
    els.locationName.textContent = '画像を取得できませんでした';
    els.photoCount.textContent = '0 / 0';
    return;
  }

  showCurrentPhoto();
  preloadNext();
  startTicker();

  fillImagePool(120);
}

function showCurrentPhoto() {
  const loc = getCurrentPhoto();
  if (!loc) return;

  setPhotoBackground(loc.imgUrl);
  els.locationName.textContent = buildCaption(loc);
  updatePhotoCounter();

  if (loadedPhotos.length - currentIndex < 20) {
    fillImagePool(loadedPhotos.length + 50);
  }
}

function preloadNext() {
  if (!loadedPhotos.length) {
    nextReady = false;
    return;
  }

  const nextLoc = loadedPhotos[(currentIndex + 1) % loadedPhotos.length];
  if (!nextLoc) {
    nextReady = false;
    return;
  }

  nextReady = false;
  nextImage = new Image();
  nextImage.onload = () => { nextReady = true; };
  nextImage.onerror = () => { nextReady = false; };
  nextImage.src = nextLoc.imgUrl;
}

function showPhotoAt(index) {
  if (!loadedPhotos.length) return;

  isPaused = true;
  updatePauseIcon();
  setProgress(0);

  currentIndex = (index + loadedPhotos.length) % loadedPhotos.length;

  const loc = getCurrentPhoto();
  if (!loc) return;

  setPhotoBackground('');
  els.locationName.textContent = '';
  els.loader.style.display = 'block';

  const temp = new Image();
  temp.onload = () => {
    els.loader.style.display = 'none';
    showCurrentPhoto();
    preloadNext();
    isPaused = false;
    updatePauseIcon();
  };
  temp.onerror = () => {
    els.loader.style.display = 'none';
    els.locationName.textContent = '画像の読み込みに失敗しました';
    isPaused = false;
    updatePauseIcon();
  };
  temp.src = loc.imgUrl;
}

function attemptAutoNext() {
  if (currentMode === 'news') {
    newsIndex++;
    showNewsItem();
    setProgress(0);
    return;
  }

  if (!loadedPhotos.length) return;

  if (nextReady) {
    currentIndex = (current
