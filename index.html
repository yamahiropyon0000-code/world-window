<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Window Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
  }

  .start-btn {
    padding: 22px 60px;
    background: #5ba8f5;
    color: #fff;
    border-radius: 50px;
    font-size: 24px;
    font-weight: 800;
    border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.2);
  }

  .start-sub {
    color: #666;
    font-size: 14px;
    margin-top: 16px;
  }

  header, footer {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    background: #0a0a0a;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 22px;
    border-bottom: 1px solid #1a1a1a;
  }

  .app-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .mode-tabs {
    display: flex;
    gap: 5px;
    background: #222;
    border-radius: 10px;
    padding: 3px;
  }

  .mode-tab {
    padding: 7px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .mode-tab.active {
    background: #fff;
    color: #000;
  }

  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .news-container {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    justify-content: flex-start;
    align-items: stretch;
    padding: 14px 12px 8px;
    overflow-y: auto;
    z-index: 20;
    width: 100%;
  }

  .news-inner {
    width: 100%;
    max-width: none;
    margin: 0;
  }

  .news-title {
    font-size: clamp(32px, 4.9vw, 66px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 10px;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .news-meta {
    font-size: 13px;
    color: #9a9a9a;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .news-desc {
    font-size: clamp(22px, 2.25vw, 30px);
    line-height: 1.5;
    color: #d0d0d0;
  }

  .news-link {
    display: inline-block;
    margin-top: 16px;
    color: #5ba8f5;
    font-size: 18px;
    text-decoration: none;
    border-bottom: 2px solid #5ba8f5;
    width: fit-content;
  }

  #loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    color: #777;
    display: none;
    z-index: 30;
    text-align: center;
    line-height: 1.8;
    white-space: pre-line;
  }

  footer {
    padding: 8px 22px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 8px));
    border-top: 1px solid #1a1a1a;
  }

  .location-name {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    min-height: 1.35em;
    margin-bottom: 6px;
    line-height: 1.18;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: #1a1a1a;
    border-radius: 3px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  #progressFill {
    height: 100%;
    background: #5ba8f5;
    width: 0%;
    transition: width 0.1s linear;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .ctrl-btn {
    background: #222;
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .play-pause-btn {
    width: 56px;
    height: 56px;
    font-size: 24px;
    background: #5ba8f5;
  }

  .photo-count {
    position: absolute;
    bottom: 4px;
    left: 22px;
    font-size: 8px;
    color: #333;
  }

  .version-tag {
    position: absolute;
    bottom: 4px;
    right: 22px;
    font-size: 8px;
    color: #333;
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">旅を開始する</button>
  <p class="start-sub">世界の街や風景をランダムに収集します</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')" translate="no">絶景</button>
    <button class="mode-tab" id="tabAlternate" onclick="switchMode('alternate')" translate="no">交互</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')" translate="no">ニュース</button>
  </div>
</header>

<div class="content" id="mainView">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en" translate="yes">
    <div id="newsContent" class="news-inner"></div>
  </div>
</div>

<footer>
  <div id="locationName" class="location-name" translate="yes"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">&#9198;</button>
    <button class="ctrl-btn play-pause-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" onclick="manualNext()">&#9197;</button>
  </div>
  <span class="photo-count" id="photoCount" translate="no"></span>
  <div class="version-tag" translate="no">live-b1</div>
</footer>

<script>
let currentMode = 'photo';
let isPaused = false;
let progress = 0;
let currentIndex = 0;
let cachedNews = [];
let newsIndex = -1;
let nextImage = new Image();
let nextReady = false;
let loadedPhotos = [];
let tickerId = null;
let newsLoaded = false;
let initStarted = false;
let isFillingPool = false;
let alternateStep = 'photo';
let isSwitching = false;

const COMMONS_API = 'https://commons.wikimedia.org/w/api.php';

const INITIAL_POOL = 16;
const MIN_POOL = 80;
const REFILL_AT = 20;
const REFILL_ADD = 40;
const MAX_POOL = 220;
const RECENT_HISTORY_LIMIT = 200;

const PHOTO_DURATION = 20;
const NEWS_DURATION = 12.5;

const recentPhotoIds = [];
const allSeenPhotoIds = new Set();

const SOURCE_CATEGORIES = [
  'Category:Featured pictures of cityscapes',
  'Category:Featured pictures of mountains',
  'Category:Featured pictures of lakes',
  'Category:Featured pictures of skylines',
  'Category:Featured pictures of beaches',
  'Category:Featured pictures of rivers',
  'Category:Featured pictures of villages',
  'Category:Featured pictures of forests',
  'Category:Featured pictures of islands',
  'Category:Featured pictures of harbours',
  'Category:Featured pictures of waterfalls',
  'Category:Featured pictures of canyons',
  'Category:Featured pictures of deserts',
  'Category:Featured pictures of old towns',
  'Category:Featured pictures of valleys',
  'Category:Featured pictures of coastlines'
];

const categoryCursor = {};

const els = {
  startOverlay: document.getElementById('startOverlay'),
  startBtn: document.querySelector('#startOverlay .start-btn'),
  mainView: document.getElementById('mainView'),
  locationName: document.getElementById('locationName'),
  photoCount: document.getElementById('photoCount'),
  progressFill: document.getElementById('progressFill'),
  loader: document.getElementById('loader'),
  newsContainer: document.getElementById('newsContainer'),
  newsContent: document.getElementById('newsContent'),
  pauseBtn: document.getElementById('pauseBtn'),
  tabPhoto: document.getElementById('tabPhoto'),
  tabAlternate: document.getElementById('tabAlternate'),
  tabNews: document.getElementById('tabNews')
};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.textContent || div.innerText || '').trim();
}

function cleanFileTitle(title) {
  return decodeURIComponent(
    (title || '')
      .replace(/^File:/i, '')
      .replace(/\.[a-z0-9]{2,5}$/i, '')
      .replace(/[_]+/g, ' ')
  ).trim();
}

function shortenText(text, maxLen) {
  const s = (text || '').replace(/\s+/g, ' ').trim();
  if (!s) return '';
  return s.length > maxLen ? s.slice(0, maxLen) + '…' : s;
}

function setProgress(value) {
  progress = Math.max(0, Math.min(100, value));
  els.progressFill.style.width = progress + '%';
}

function setPhotoBackground(url) {
  els.mainView.style.backgroundImage = url ? `url("${url}")` : 'none';
}

function getCurrentPhoto() {
  if (!loadedPhotos.length) return null;
  return loadedPhotos[currentIndex % loadedPhotos.length];
}

function getCurrentDisplayMode() {
  return currentMode === 'alternate' ? alternateStep : currentMode;
}

function updateCounter() {
  const displayMode = getCurrentDisplayMode();

  if (displayMode === 'news') {
    els.photoCount.textContent = cachedNews.length
      ? `${((newsIndex % cachedNews.length) + cachedNews.length) % cachedNews.length + 1} / ${cachedNews.length}`
      : '0 / 0';
    return;
  }

  els.photoCount.textContent = loadedPhotos.length
    ? `${(currentIndex % loadedPhotos.length) + 1} / ${loadedPhotos.length}`
    : '0 / 0';
}

function setLoader(text, show = true) {
  els.loader.textContent = text;
  els.loader.style.display = show ? 'block' : 'none';
}

function rememberShownPhoto(id) {
  if (!id) return;
  allSeenPhotoIds.add(id);
  recentPhotoIds.push(id);
  if (recentPhotoIds.length > RECENT_HISTORY_LIMIT) {
    recentPhotoIds.shift();
  }
}

function isRecentlyShown(id) {
  return recentPhotoIds.includes(id);
}

function categoryText(page) {
  return (page.categories || [])
    .map(c => (c.title || '').replace(/^Category:/i, ''))
    .join(' | ')
    .toLowerCase();
}

function looksLikeBadImage(page) {
  const ii = page.imageinfo && page.imageinfo[0];
  if (!ii) return true;

  const mime = (ii.mime || '').toLowerCase();
  const title = (page.title || '').toLowerCase();
  const cats = categoryText(page);
  const desc = (
    stripHtml(ii.extmetadata?.ImageDescription?.value || '') + ' ' +
    stripHtml(ii.extmetadata?.ObjectName?.value || '')
  ).toLowerCase();

  if (!mime.startsWith('image/')) return true;
  if (!(mime.includes('jpeg') || mime.includes('jpg'))) return true;
  if ((ii.width || 0) < 1100 || (ii.height || 0) < 700) return true;

  const badWords = [
    'logo', 'flag', 'map', 'locator', 'route map', 'diagram', 'chart', 'symbol',
    'seal', 'crest', 'coat of arms', 'icon', 'poster', 'stamp', 'banknote',
    'drawing', 'painting', 'illustration', 'etching', 'engraving', 'sketch',
    'portrait', 'selfie', 'passport', 'document', 'signature', 'currency',
    'emblem', 'screenshot', 'cover art', 'book cover', 'movie poster',
    'aircraft', 'train interior', 'bus interior', 'car interior'
  ];

  for (const word of badWords) {
    if (title.includes(word) || cats.includes(word) || desc.includes(word)) return true;
  }

  return false;
}

function extractTheme(text) {
  const t = (text || '').toLowerCase();
  if (t.includes('cityscape') || t.includes('skyline')) return '街並み';
  if (t.includes('village') || t.includes('old town')) return '村や旧市街';
  if (t.includes('mountain') || t.includes('alps') || t.includes('himalaya') || t.includes('valley')) return '山の風景';
  if (t.includes('lake')) return '湖';
  if (t.includes('river')) return '川辺';
  if (t.includes('beach') || t.includes('coast') || t.includes('shore') || t.includes('coastline')) return '海辺';
  if (t.includes('harbour') || t.includes('harbor') || t.includes('port')) return '港';
  if (t.includes('forest')) return '森';
  if (t.includes('waterfall')) return '滝';
  if (t.includes('desert')) return '砂漠';
  if (t.includes('island')) return '島';
  if (t.includes('canyon') || t.includes('gorge')) return '渓谷';
  return '世界の風景';
}

function extractPlace(page) {
  const candidates = (page.categories || [])
    .map(c => c.title.replace(/^Category:/i, ''))
    .filter(t => / in | of | from | at /i.test(t));

  if (!candidates.length) return '';
  const best = candidates[0]
    .replace(/^Featured pictures of\s*/i, '')
    .replace(/^Photographs of\s*/i, '')
    .replace(/\s*\([^)]*\)\s*/g, ' ')
    .trim();

  return shortenText(best, 60);
}

function pageToPhotoItem(page) {
  const ii = page.imageinfo && page.imageinfo[0];
  if (!ii || !ii.thumburl) return null;

  const titleClean = cleanFileTitle(page.title);
  const rawDesc =
    stripHtml(ii.extmetadata?.ObjectName?.value || '') ||
    stripHtml(ii.extmetadata?.ImageDescription?.value || '');

  const cats = categoryText(page);
  const place = extractPlace(page);
  const theme = extractTheme(cats + ' ' + rawDesc + ' ' + titleClean);

  const parts = [];
  if (place) parts.push(place);
  if (theme) parts.push(theme);
  if (rawDesc) parts.push(shortenText(rawDesc, 78));
  else parts.push(shortenText(titleClean, 78));

  return {
    id: page.title,
    imgUrl: ii.thumburl,
    titleClean,
    caption: parts.join(' / ')
  };
}

async function apiFetch(params) {
  const url = new URL(COMMONS_API);
  Object.entries({
    action: 'query',
    format: 'json',
    origin: '*',
    ...params
  }).forEach(([k, v]) => {
    if (v !== undefined && v !== null && v !== '') {
      url.searchParams.set(k, v);
    }
  });

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchCategoryFiles(categoryTitle, limit = 24) {
  const params = {
    list: 'categorymembers',
    cmtitle: categoryTitle,
    cmtype: 'file',
    cmlimit: String(limit)
  };

  if (categoryCursor[categoryTitle]) {
    params.cmcontinue = categoryCursor[categoryTitle];
  }

  const data = await apiFetch(params);
  categoryCursor[categoryTitle] = data.continue?.cmcontinue || null;

  return data.query?.categorymembers || [];
}

async function fetchRandomFiles(limit = 20) {
  const data = await apiFetch({
    list: 'random',
    rnnamespace: '6',
    rnlimit: String(limit)
  });
  return data.query?.random || [];
}

async function fetchFileInfo(fileTitles) {
  if (!fileTitles.length) return [];

  const chunks = [];
  for (let i = 0; i < fileTitles.length; i += 20) {
    chunks.push(fileTitles.slice(i, i + 20));
  }

  const pages = [];
  for (const chunk of chunks) {
    const data = await apiFetch({
      prop: 'imageinfo|categories',
      titles: chunk.join('|'),
      iiprop: 'url|extmetadata|size|mime',
      iiurlwidth: '1600',
      cllimit: '20'
    });

    const rawPages = data.query?.pages || {};
    for (const pageId in rawPages) {
      pages.push(rawPages[pageId]);
    }
  }

  return pages;
}

async function loadFromCategories() {
  const category = SOURCE_CATEGORIES[Math.floor(Math.random() * SOURCE_CATEGORIES.length)];
  let files = [];

  try {
    files = await fetchCategoryFiles(category, 36);
  } catch (e) {
    console.warn('Category fetch failed:', category, e);
    return [];
  }

  shuffle(files);
  const titles = files.slice(0, 24).map(f => f.title);

  try {
    const pages = await fetchFileInfo(titles);
    const items = pages
      .filter(page => !looksLikeBadImage(page))
      .map(pageToPhotoItem)
      .filter(Boolean);

    items.sort((a, b) => {
      const aRecent = isRecentlyShown(a.id) ? 1 : 0;
      const bRecent = isRecentlyShown(b.id) ? 1 : 0;
      return aRecent - bRecent;
    });

    return items;
  } catch (e) {
    console.warn('File info fetch failed:', e);
    return [];
  }
}

async function loadFromRandomFallback() {
  let files = [];

  try {
    files = await fetchRandomFiles(24);
  } catch (e) {
    console.warn('Random file fetch failed:', e);
    return [];
  }

  const titles = files.map(f => f.title);

  try {
    const pages = await fetchFileInfo(titles);
    const items = pages
      .filter(page => !looksLikeBadImage(page))
      .map(pageToPhotoItem)
      .filter(Boolean);

    items.sort((a, b) => {
      const aRecent = isRecentlyShown(a.id) ? 1 : 0;
      const bRecent = isRecentlyShown(b.id) ? 1 : 0;
      return aRecent - bRecent;
    });

    return items;
  } catch (e) {
    console.warn('Random file info fetch failed:', e);
    return [];
  }
}

function trimPoolIfNeeded() {
  if (loadedPhotos.length <= MAX_POOL) return;

  const currentId = getCurrentPhoto()?.id;
  const nextId = loadedPhotos[(currentIndex + 1) % loadedPhotos.length]?.id;

  loadedPhotos = loadedPhotos.filter((item, idx) => {
    if (item.id === currentId || item.id === nextId) return true;
    return idx >= currentIndex - 2;
  });

  if (loadedPhotos.length > MAX_POOL) {
    loadedPhotos = loadedPhotos.slice(currentIndex, currentIndex + MAX_POOL);
    currentIndex = 0;
  }
}

async function fillImagePool(targetCount = MIN_POOL) {
  if (isFillingPool) return;
  if (loadedPhotos.length >= targetCount) return;

  isFillingPool = true;

  try {
    const inPool = new Set(loadedPhotos.map(p => p.id));
    let safety = 0;

    while (loadedPhotos.length < targetCount && safety < 12) {
      safety++;

      let items = await loadFromCategories();
      if (items.length < 6) {
        const fallback = await loadFromRandomFallback();
        items = items.concat(fallback);
      }

      items = items.filter(item => !inPool.has(item.id));

      const fresh = items.filter(item => !isRecentlyShown(item.id));
      const older = items.filter(item => isRecentlyShown(item.id));
      const ordered = fresh.concat(older);

      for (const item of ordered) {
        if (!inPool.has(item.id)) {
          inPool.add(item.id);
          loadedPhotos.push(item);
        }
      }
    }

    trimPoolIfNeeded();
  } finally {
    isFillingPool = false;
  }
}

function rebalanceCurrentIndex() {
  if (!loadedPhotos.length) {
    currentIndex = 0;
    return;
  }
  currentIndex = ((currentIndex % loadedPhotos.length) + loadedPhotos.length) % loadedPhotos.length;
}

function showCurrentPhoto() {
  const item = getCurrentPhoto();
  if (!item) return;

  setPhotoBackground(item.imgUrl);
  els.newsContainer.style.display = 'none';
  els.locationName.textContent = item.caption || item.titleClean || '世界の風景';
  updateCounter();

  rememberShownPhoto(item.id);

  const remain = loadedPhotos.length - currentIndex - 1;
  if (remain <= REFILL_AT) {
    fillImagePool(Math.min(MAX_POOL, Math.max(MIN_POOL, loadedPhotos.length + REFILL_ADD)));
  }
}

function chooseBestNextPhotoIndex(direction = 1) {
  if (!loadedPhotos.length) return 0;
  if (loadedPhotos.length === 1) return 0;

  const candidates = [];
  const scanCount = Math.min(18, loadedPhotos.length - 1);

  for (let offset = 1; offset <= scanCount; offset++) {
    const idx = direction > 0
      ? (currentIndex + offset) % loadedPhotos.length
      : (currentIndex - offset + loadedPhotos.length) % loadedPhotos.length;

    const item = loadedPhotos[idx];
    if (!item) continue;

    const recentPenalty = isRecentlyShown(item.id) ? 100 : 0;
    const score = recentPenalty + offset;
    candidates.push({ idx, score });
  }

  candidates.sort((a, b) => a.score - b.score);
  return candidates.length ? candidates[0].idx : ((currentIndex + direction + loadedPhotos.length) % loadedPhotos.length);
}

function preloadNext() {
  if (!loadedPhotos.length) {
    nextReady = false;
    return;
  }

  const nextIdx = chooseBestNextPhotoIndex(1);
  const item = loadedPhotos[nextIdx];
  if (!item) {
    nextReady = false;
    return;
  }

  nextReady = false;
  nextImage = new Image();
  nextImage.onload = () => { nextReady = true; };
  nextImage.onerror = () => { nextReady = false; };
  nextImage.src = item.imgUrl;
}

function showPhotoAtIndex(targetIndex) {
  if (!loadedPhotos.length) return;

  isPaused = true;
  updatePauseIcon();
  setProgress(0);

  currentIndex = targetIndex;
  rebalanceCurrentIndex();

  const item = getCurrentPhoto();
  if (!item) return;

  setPhotoBackground('');
  els.newsContainer.style.display = 'none';
  els.locationName.textContent = '';
  setLoader('Now Loading...', true);

  const temp = new Image();
  temp.onload = () => {
    setLoader('', false);
    showCurrentPhoto();
    preloadNext();
    isPaused = false;
    updatePauseIcon();
  };
  temp.onerror = () => {
    setLoader('', false);
    els.locationName.textContent = '画像の読み込みに失敗しました';
    isPaused = false;
    updatePauseIcon();
  };
  temp.src = item.imgUrl;
}

async function loadNews(forceReload = false) {
  if (!forceReload && newsLoaded && cachedNews.length) return true;

  try {
    const res = await fetch(`./news.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`news.json HTTP ${res.status}`);

    const data = await res.json();
    const items = Array.isArray(data.items) ? data.items : [];

    cachedNews = items.filter(item => item && item.title);
    newsLoaded = cachedNews.length > 0;

    if (newsLoaded && (newsIndex < 0 || newsIndex >= cachedNews.length)) {
      newsIndex = 0;
    }

    return newsLoaded;
  } catch (e) {
    console.warn('loadNews failed:', e);
    cachedNews = [];
    newsLoaded = false;
    return false;
  }
}

async function ensureNewsReady() {
  if (newsLoaded && cachedNews.length) return true;
  return await loadNews(false);
}

function renderNewsItem(item) {
  els.newsContent.innerHTML = '';

  const titleEl = document.createElement('h1');
  titleEl.className = 'news-title';
  titleEl.textContent = item.title || '';

  const metaEl = document.createElement('div');
  metaEl.className = 'news-meta';
  const metaParts = [];
  if (item.source) metaParts.push(item.source);
  if (item.region) metaParts.push(item.region);
  if (item.pubDate) {
    const d = new Date(item.pubDate);
    if (!Number.isNaN(d.getTime())) {
      metaParts.push(d.toLocaleString());
    }
  }
  metaEl.textContent = metaParts.join(' / ');

  const descEl = document.createElement('p');
  descEl.className = 'news-desc';
  const desc = stripHtml(item.description || '');
  descEl.textContent = desc.length > 900 ? desc.slice(0, 900) + '...' : desc;

  els.newsContent.appendChild(titleEl);
  if (metaEl.textContent) els.newsContent.appendChild(metaEl);
  els.newsContent.appendChild(descEl);

  if (item.link) {
    const linkEl = document.createElement('a');
    linkEl.className = 'news-link';
    linkEl.href = item.link;
    linkEl.target = '_blank';
    linkEl.rel = 'noopener noreferrer';
    linkEl.textContent = '記事を詳しく読む →';
    els.newsContent.appendChild(linkEl);
  }
}

async function showNewsAtCurrentIndex() {
  els.newsContainer.style.display = 'flex';
  setPhotoBackground('');

  if (!cachedNews.length) {
    els.newsContent.innerHTML = "<h1 class='news-title'>News data not ready yet.</h1><p class='news-desc'>news.json の更新を待っています。</p>";
    els.locationName.textContent = '世界ニュース速報';
    updateCounter();
    return;
  }

  const safeIndex = ((newsIndex % cachedNews.length) + cachedNews.length) % cachedNews.length;
  const item = cachedNews[safeIndex];
  renderNewsItem(item);
  els.locationName.textContent = item.source ? `世界ニュース速報 / ${item.source}` : '世界ニュース速報';
  updateCounter();
}

async function advanceNewsForward() {
  const ok = await ensureNewsReady();
  if (!ok) {
    await showNewsAtCurrentIndex();
    return;
  }

  newsIndex = (newsIndex + 1) % cachedNews.length;
  await showNewsAtCurrentIndex();
}

async function advanceNewsBackward() {
  const ok = await ensureNewsReady();
  if (!ok) {
    await showNewsAtCurrentIndex();
    return;
  }

  newsIndex = (newsIndex - 1 + cachedNews.length) % cachedNews.length;
  await showNewsAtCurrentIndex();
}

async function switchMode(mode) {
  currentMode = mode;

  els.tabPhoto.classList.toggle('active', mode === 'photo');
  els.tabAlternate.classList.toggle('active', mode === 'alternate');
  els.tabNews.classList.toggle('active', mode === 'news');

  if (mode === 'photo') {
    els.newsContainer.style.display = 'none';
    showCurrentPhoto();
    preloadNext();
  } else if (mode === 'news') {
    alternateStep = 'news';
    if (!newsLoaded || !cachedNews.length) {
      const ok = await loadNews(false);
      if (!ok) {
        await showNewsAtCurrentIndex();
        setProgress(0);
        return;
      }
    }
    if (newsIndex < 0) newsIndex = 0;
    await showNewsAtCurrentIndex();
  } else {
    alternateStep = 'photo';
    showCurrentPhoto();
    preloadNext();
  }

  setProgress(0);
}

async function advanceAlternateForward() {
  if (alternateStep === 'photo') {
    alternateStep = 'news';
    await advanceNewsForward();
  } else {
    alternateStep = 'photo';
    currentIndex = chooseBestNextPhotoIndex(1);
    showCurrentPhoto();
    preloadNext();
  }
  setProgress(0);
}

async function advanceAlternateBackward() {
  if (alternateStep === 'photo') {
    alternateStep = 'news';
    await advanceNewsBackward();
  } else {
    alternateStep = 'photo';
    currentIndex = chooseBestNextPhotoIndex(-1);
    showCurrentPhoto();
    preloadNext();
  }
  setProgress(0);
}

async function attemptAutoNext() {
  if (isSwitching) return;
  isSwitching = true;

  try {
    if (currentMode === 'news') {
      await advanceNewsForward();
      setProgress(0);
      return;
    }

    if (currentMode === 'alternate') {
      await advanceAlternateForward();
      return;
    }

    if (!loadedPhotos.length) return;

    currentIndex = chooseBestNextPhotoIndex(1);
    showCurrentPhoto();
    preloadNext();
    setProgress(0);
  } finally {
    isSwitching = false;
  }
}

async function manualNext() {
  if (currentMode === 'news') {
    await advanceNewsForward();
    setProgress(0);
    return;
  }

  if (currentMode === 'alternate') {
    await advanceAlternateForward();
    return;
  }

  if (!loadedPhotos.length) return;
  showPhotoAtIndex(chooseBestNextPhotoIndex(1));
}

async function manualPrev() {
  if (currentMode === 'news') {
    await advanceNewsBackward();
    setProgress(0);
    return;
  }

  if (currentMode === 'alternate') {
    await advanceAlternateBackward();
    return;
  }

  if (!loadedPhotos.length) return;
  showPhotoAtIndex(chooseBestNextPhotoIndex(-1));
}

function togglePause() {
  isPaused = !isPaused;
  updatePauseIcon();
}

function updatePauseIcon() {
  els.pauseBtn.innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function startTicker() {
  if (tickerId !== null) return;

  tickerId = setInterval(() => {
    if (isPaused || isSwitching) return;

    const displayMode = getCurrentDisplayMode();
    const duration = displayMode === 'news' ? NEWS_DURATION : PHOTO_DURATION;

    if (progress >= 100) {
      attemptAutoNext();
      return;
    }

    setProgress(progress + (10 / duration));
  }, 100);
}

async function initApp() {
  if (initStarted) return;
  initStarted = true;

  els.startOverlay.style.cursor = 'default';
  els.startOverlay.onclick = null;
  els.startBtn.textContent = '収集中...';
  setLoader('最初の風景を集めています...', true);

  try {
    await fillImagePool(INITIAL_POOL);

    if (!loadedPhotos.length) {
      throw new Error('no images');
    }

    shuffle(loadedPhotos);
    rebalanceCurrentIndex();
    currentIndex = chooseBestNextPhotoIndex(1) % loadedPhotos.length;
    showCurrentPhoto();
    preloadNext();
    startTicker();

    els.startOverlay.style.display = 'none';
    setLoader('', false);

    fillImagePool(MIN_POOL);
    loadNews(false).catch(err => console.warn(err));
  } catch (e) {
    console.warn(e);
    setLoader('', false);
    els.startBtn.textContent = '再試行する';
    els.startOverlay.onclick = initApp;
    initStarted = false;
  }
}
</script>
