<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.03</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 余計な transition（アニメーション）をすべて削除 */
  #bgContainer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center;
    z-index: 1;
  }
  #bgOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.3); z-index: 2;
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(20, 20, 40, 0.85);
  }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; z-index: 10; }
  .news-container {
    width: 100%; height: 100%; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; background: rgba(10, 10, 26, 0.8);
  }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: rgba(18, 18, 37, 0.9); border-top: 1px solid rgba(255,255,255,0.15);
  }
  .location-info { margin-bottom: 12px; }
  .location-name { font-size: 22px; font-weight: 700; color: #fff; }
  
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); margin-bottom: 25px; }
  #progressFill { height: 100%; background: #5ba8f5; width: 0%; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; }

  .version-tag {
    position: absolute; bottom: 8px; right: 100px;
    font-size: 10px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="bgContainer"></div>
<div id="bgOverlay"></div>

<header translate="no">
  <span style="font-size:20px; font-weight:700;">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info">
    <span id="locationName">Starting...</span>
  </div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background:#5ba8f5;" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.03</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;

const locations = [
  { name: "Paris, France", kw: "paris" },
  { name: "Tokyo, Japan", kw: "tokyo" },
  { name: "Swiss Alps", kw: "switzerland" },
  { name: "New York, USA", kw: "nyc" },
  { name: "Venice, Italy", kw: "venice" },
  { name: "London, UK", kw: "london" },
  { name: "Sydney, Australia", kw: "sydney" }
];

function showPhoto() {
  const loc = locations[currentIndex % locations.length];
  // 待ち時間なしで即座にURLとテキストを書き換える
  document.getElementById('bgContainer').style.backgroundImage = 
    `url('https://loremflickr.com/1600/900/${loc.kw}?lock=${Date.now()}')`;
  document.getElementById('locationName').textContent = loc.name;
}

function goNext() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex--; if(currentIndex<0) currentIndex=locations.length-1; showPhoto(); }
  else { newsIndex--; if(newsIndex<0) newsIndex=0; showNewsItem(); }
}

async function loadNews() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
  const data = await res.json();
  cachedNews = data.items;
  showNewsItem();
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 style="font-size:clamp(32px, 5vw, 60px); font-weight:800; line-height:1.2;">${item.title}</h1>
    <p style="font-size:clamp(18px, 3vw, 32px); line-height:1.6; color:#ccc; margin-top:20px;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  progress = 0;
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

setInterval(() => {
  if (isPaused) return;
  progress += (100 / (currentMode === 'photo' ? 45 : 25));
  document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
  if (progress >= 100) goNext();
}, 1000);

showPhoto();
</script>
</body>
</html>
