<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 1.05</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 26, 0.98);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 20px 50px; background: #5ba8f5; color: #fff;
    border-radius: 50px; font-size: 26px; font-weight: 700;
  }

  /* エラー通知 */
  #errorStatus {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #ff6b6b; z-index: 5; display: none; width: 80%;
  }

  header, footer { flex-shrink: 0; z-index: 100; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(20, 20, 40, 0.9); backdrop-filter: blur(15px);
  }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; overflow: hidden; background: #000; }
  #playerContainer { width: 100%; height: 100%; pointer-events: none; }

  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a1a; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 10;
  }
  .news-title { font-size: clamp(32px, 5vw, 60px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: #121225; border-top: 1px solid rgba(255,255,255,0.15); position: relative;
  }
  .location-info { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 25px; }
  .progress-fill { height: 100%; background: #5ba8f5; width: 0%; transition: width 1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .main-next { background: #5ba8f5; }

  .version-tag {
    position: absolute; bottom: 8px; right: 100px; /* さらに左へ移動 */
    font-size: 10px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <div class="start-btn">タップして開始</div>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('camera')">Camera</button>
    <button class="mode-tab" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="errorStatus">
    <h2>カメラ接続エラー</h2>
    <p id="errorMsg">YouTubeがこのドメインでの再生を制限しています</p>
  </div>
  <div id="playerContainer"></div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info">
    <span id="locationName">Waiting...</span>
  </div>
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 1.05</div>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, currentMode = 'camera', isPaused = false, progress = 0;
let errorCount = 0;
const cameras = [
  { city: "NASA Live", id: "21X5lGlDOfg" }, // 比較的安定
  { city: "Sky News", id: "9AuqUPW28s" },
  { city: "Tokyo Tower", id: "m6kXm_f3TfQ" },
  { city: "Africa Safary", id: "FvFwYfT_OTo" }
];
let currentIndex = 0;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('playerContainer', {
    height: '100%', width: '100%',
    playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
    events: { 'onReady': () => console.log("Ready"), 'onError': onPlayerError }
  });
}

function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  showCamera();
  startTicker();
}

function onPlayerError(e) {
  errorCount++;
  document.getElementById('errorStatus').style.display = 'block';
  document.getElementById('errorMsg').textContent = `エラーを検知しました (${errorCount}/5)。3秒後に次を試します...`;

  if (errorCount >= 5) {
    document.getElementById('errorMsg').textContent = "全カメラがブロックされました。ドメイン制限の可能性があります。";
    isPaused = true;
    return;
  }

  // 高速ループ防止：3秒待ってから次へ
  setTimeout(() => {
    if (currentMode === 'camera') goNext();
  }, 3000);
}

function showCamera() {
  const cam = cameras[currentIndex % cameras.length];
  if (player && player.loadVideoById) {
    document.getElementById('errorStatus').style.display = 'none';
    player.loadVideoById(cam.id);
    document.getElementById('locationName').textContent = cam.city;
  }
}

function goNext() {
  if (currentMode === 'camera') { currentIndex++; showCamera(); }
  else { /* ニュース処理 */ }
  resetProgress();
}

function resetProgress() { progress = 0; }
function togglePause() { isPaused = !isPaused; }

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    progress += (100 / 45);
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 1000);
}
</script>
</body>
</html>
