<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.21</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510; /* 全画面を無彩色のソリッドな黒に近いグレーに */
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 初期開始オーバーレイ：赤を完全排除 */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 26, 0.99); /* 濃い黒グレー */
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 20px 50px; background: #5ba8f5; color: #fff;
    border-radius: 50px; font-size: 26px; font-weight: 700;
    box-shadow: 0 0 30px rgba(91, 168, 245, 0.3);
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(10, 10, 20, 0.9); backdrop-filter: blur(15px);
  }
  .app-title { font-size: 20px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  /* メインコンテンツエリア：ソリッドな背景の上に写真窓を配置 */
  .content { 
    flex: 1; 
    position: relative; 
    overflow: hidden; 
    background: #050510; /* 周囲はソリッドな背景 */
    display: flex; /* 写真窓を中央に配置 */
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* 中央の写真窓：ここにだけ画像が出る */
  #photoWindow {
    width: 80vh; /* 縦横比を正方形に */
    height: 80vh;
    max-width: calc(100% - 40px); /* 画面内に収まるように調整 */
    max-height: calc(100% - 40px);
    background-size: cover;
    background-position: center;
    background-image: none; /* 初期状態 */
    border: 12px solid #22222a; /* 窓枠（薄いグレー）を追加 */
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); /* 奥行きと影 */
    transition: background-image 0.5s ease; /* 切り替えを滑らかに */
    display: flex; /* エラーメッセージ中央寄せ */
    align-items: center;
    justify-content: center;
    color: #ff6b6b; /* エラー文字のみ赤（怖い画面ではない） */
    font-size: 18px;
    text-align: center;
    position: relative; /* Loaderのため */
  }
  #photoWindow .error-msg {
    display: none; /* 初期非表示 */
  }

  /* ローディング表示：窓の中に配置 */
  #loader { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    font-size: 14px; 
    color: #5ba8f5; 
    display: none; 
    z-index: 20; 
  }

  /* ニュースコンテナ：窓の上にオーバーレイ */
  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 26, 0.98); /* ニュースはほぼソリッドな背景 */
    display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 30; /* 写真窓の上に表示 */
  }
  .news-title { font-size: clamp(32px, 5vw, 60px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; color: #fff; }
  .news-description { font-size: clamp(18px, 3vw, 32px); line-height: 1.6; color: #eee; }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: rgba(18, 18, 37, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.15);
  }
  .location-info { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .location-name { font-size: 22px; font-weight: 700; color: #fff; }
  
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
  #progressFill { 
    height: 100%; background: linear-gradient(90deg, #5ba8f5, #a78bfa); width: 0%; 
    transition: width 0.3s linear; /* 細かい更新間隔に合わせて滑らかに */
  }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; transform: scale(0.95); }
  .ctrl-btn.main-next { background: #5ba8f5; box-shadow: 0 4px 15px rgba(91, 168, 245, 0.3); }

  .version-tag {
    position: absolute; bottom: 8px; right: 100px; /* バージョンは左へ移動 */
    font-size: 10px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <div class="start-btn">TAP to Begin World Tour</div>
  <p style="margin-top:20px; color:#888; font-size:16px;">This central window will show the world.</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="photoWindow">
    <div id="loader">Searching...</div>
    <div class="error-msg">Image not found.<br>Skipping to the next city...</div>
  </div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info">
    <span id="locationName">Loading Window...</span>
  </div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.21</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let loadTimeout;

const cities = [
  "New York", "Tokyo", "London", "Paris", "Seoul", "Bangkok", "Singapore", "Dubai", "Rome", "Barcelona",
  "Kyoto", "Osaka", "Hokkaido", "Okinawa", "San Francisco", "Los Angeles", "Chicago", "Miami", "Las Vegas",
  "Venice", "Florence", "Milan", "Naples", "Berlin", "Munich", "Hamburg", "Madrid", "Lisbon", "Porto",
  "Amsterdam", "Brussels", "Vienna", "Prague", "Budapest", "Warsaw", "Stockholm", "Oslo", "Copenhagen",
  "Helsinki", "Moscow", "Istanbul", "Athens", "Cairo", "Cape Town", "Nairobi", "Marrakech", "Mumbai",
  "Delhi", "Beijing", "Shanghai", "Hong Kong", "Taipei", "Sydney", "Melbourne", "Auckland",
  "Vancouver", "Toronto", "Montreal", "Mexico City", "Havana", "Rio de Janeiro", "Buenos Aires", "Santiago",
  "Machu Picchu", "Santorini", "Bali", "Phuket", "Maldives", "Bora Bora", "Banff", "Yellowstone", "Grand Canyon",
  "Yosemite", "Swiss Alps", "Matterhorn", "Mont Saint-Michel", "Petra", "Giza", "Taj Mahal", "Great Wall",
  "Montpellier", "Nice", "Lyon", "Marseille", "Toulouse", "Bordeaux", "Nantes", "Strasbourg", "Rennes", "Reims",
  "Lille", "Brest", "Dijon", "Angers", "Le Mans", "Aix-en-Provence", "Grenoble", "Toulon", "Nimes", "Avignon"
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showPhoto() {
  clearTimeout(loadTimeout);
  const city = cities[currentIndex % cities.length];
  const bg = document.getElementById('photoWindow'); // 窓コンテナに指定
  const loader = document.getElementById('loader');
  bg.querySelector('.error-msg').style.display = 'none'; // 前のエラーをクリア

  loader.style.display = 'block';
  
  // 品質を上げるため、travel,landmarkタグを組み合わせて動的検索
  const imgUrl = `https://loremflickr.com/1600/1600/${encodeURIComponent(city)},travel,landmark/all?lock=${Date.now()}`;
  
  const img = new Image();
  
  // 4秒経っても画像が来ない場合はスキップ
  loadTimeout = setTimeout(() => {
    console.log("Image timeout, skipping...");
    goNext();
  }, 4000);

  img.onload = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    bg.style.backgroundImage = `url('${imgUrl}')`;
    document.getElementById('locationName').textContent = city;
  };
  
  img.onerror = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    // 怖い画面ではなく、窓の中にエラー表示をして自動で次へ
    bg.querySelector('.error-msg').style.display = 'block';
    console.log("Image error, display message and skip.");
    setTimeout(() => {
      if (currentMode === 'photo') goNext();
    }, 2000);
  };
  
  img.src = imgUrl;
}

function goNext() {
  progress = 0;
  if (currentMode === 'camera' || currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  progress = 0;
  if (currentMode === 'camera' || currentMode === 'photo') { currentIndex--; if(currentIndex < 0) currentIndex = cities.length - 1; showPhoto(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
}

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) {
    document.getElementById('newsContent').innerHTML = "<h1>News Fetch Error</h1>";
  }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 style="font-size:clamp(32px, 5vw, 60px); font-weight:800; line-height:1.2;">${item.title}</h1>
    <p style="font-size:clamp(18px, 3vw, 32px); line-height:1.6; color:#ccc; margin-top:30px;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
  document.getElementById('locationName').textContent = "Breaking World News";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  progress = 0;
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

// 進捗バーを0.1秒ごとに更新してスーッと動かす
setInterval(() => {
  if (isPaused) return;
  const limit = (currentMode === 'photo' ? 45 : 25);
  progress += (10 / limit); // 0.1秒ごとの加算
  document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
  if (progress >= 100) goNext();
}, 100);

shuffle(cities);
showPhoto();
</script>
</body>
</html>
