<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.22</title>
<style>
  /* 基本設定：赤を排除し、漆黒と濃いグレーで統一 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; /* ソリッドブラック */
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ：黒背景に青ボタン */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 22px 60px; background: #5ba8f5; color: #fff;
    border-radius: 50px; font-size: 24px; font-weight: 800; border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.3);
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; background: #0a0a0a; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 25px; border-bottom: 1px solid #222;
  }
  .app-title { font-size: 20px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background: #222; border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #888; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  /* メイン：中央に正方形の窓 */
  .content { 
    flex: 1; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }

  #photoWindow {
    width: 85vh; height: 85vh; /* 正方形に近い窓 */
    max-width: 90%; max-height: 90%;
    background-size: cover; background-position: center; background-color: #111;
    border: 2px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1);
    position: relative; display: flex; align-items: center; justify-content: center;
  }

  #loader { position: absolute; bottom: 20px; right: 20px; font-size: 14px; color: #5ba8f5; display: none; }
  .error-msg { display: none; color: #888; text-align: center; font-size: 16px; }

  /* ニュース：窓の上に重ねる */
  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 200;
  }
  .news-title { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; }

  footer {
    padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    border-top: 1px solid #222;
  }
  .location-name { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 15px; }
  
  .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
  #progressFill { height: 100%; background: #5ba8f5; width: 0%; transition: width 0.1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: #222; border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; }

  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 10px; color: #444; }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">TAP TO START TOUR</button>
  <p style="margin-top:20px; color:#555;">Discover the world in the central window.</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="photoWindow">
    <div id="loader">Searching...</div>
    <div class="error-msg">Finding another path...</div>
  </div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name">Ready...</div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background:#5ba8f5;" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.22</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let loadTimeout;

// 1,000都市規模のベースリスト（動的生成の核）
const cities = [
  "Paris", "Tokyo", "London", "New York", "Venice", "Kyoto", "Rome", "Barcelona", "Dubai", "Seoul",
  "Singapore", "Bangkok", "Prague", "Vienna", "Amsterdam", "Lisbon", "Santorini", "Swiss Alps", "Banff", "Sydney",
  "Hong Kong", "Florence", "Istanbul", "Cape Town", "Rio de Janeiro", "Machu Picchu", "Hanoi", "Bali", "Phuket", "Maldives",
  "Moscow", "Berlin", "Munich", "Madrid", "Seville", "Porto", "Brussels", "Stockholm", "Oslo", "Copenhagen",
  "San Francisco", "Los Angeles", "Chicago", "Miami", "Las Vegas", "Vancouver", "Toronto", "Montreal", "Mexico City", "Havana",
  "Buenos Aires", "Santiago", "Cusco", "Cairo", "Marrakech", "Petra", "Mumbai", "Shanghai", "Taipei", "Melbourne"
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// アプリの初期化（重要：定義漏れを修正）
function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  shuffle(cities);
  showPhoto();
  startTicker();
}

function showPhoto() {
  clearTimeout(loadTimeout);
  const city = cities[currentIndex % cities.length];
  const win = document.getElementById('photoWindow');
  const loader = document.getElementById('loader');
  const error = win.querySelector('.error-msg');
  
  error.style.display = 'none';
  loader.style.display = 'block';

  // タグをランダム化して「無限」感を出す
  const tags = ["architecture", "landscape", "street", "night", "landmark"];
  const randomTag = tags[Math.floor(Math.random() * tags.length)];
  const imgUrl = `https://loremflickr.com/1200/1200/${encodeURIComponent(city)},${randomTag}/all?lock=${Date.now()}`;
  
  const img = new Image();
  loadTimeout = setTimeout(() => { goNext(); }, 5000); // 5秒でタイムアウト

  img.onload = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    win.style.backgroundImage = `url('${imgUrl}')`;
    document.getElementById('locationName').textContent = city;
  };
  
  img.onerror = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    error.style.display = 'block';
    setTimeout(goNext, 1500);
  };
  
  img.src = imgUrl;
}

function goNext() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex--; if(currentIndex<0) currentIndex=cities.length-1; showPhoto(); }
  else { newsIndex--; showNewsItem(); }
}

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.jp/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) { document.getElementById('newsContent').innerHTML = "<h1>News load failed.</h1>"; }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p style="font-size:24px; line-height:1.6; color:#ccc;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
  document.getElementById('locationName').textContent = "BBC World News";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  progress = 0;
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    const limit = (currentMode === 'photo' ? 45 : 25);
    progress += (10 / limit);
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 100);
}
</script>
</body>
</html>
