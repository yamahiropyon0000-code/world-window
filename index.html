<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 1.04</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 26, 0.98);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 20px 50px; background: #5ba8f5; color: #fff;
    border-radius: 50px; font-size: 26px; font-weight: 700;
    box-shadow: 0 0 30px rgba(91, 168, 245, 0.4);
  }

  /* 翻訳させないエリアの設定 */
  header, footer, .controls {
    unicode-bidi: isolate;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(20, 20, 40, 0.9);
    backdrop-filter: blur(15px); z-index: 100; flex-shrink: 0;
  }
  .app-title { font-size: 20px; font-weight: 700; }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; overflow: hidden; }
  #playerContainer { width: 100%; height: 100%; pointer-events: none; }

  /* ニュースコンテナ：ここを翻訳対象にする */
  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a1a; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 10;
  }
  .news-title { font-size: clamp(32px, 5vw, 60px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; color: #fff; }
  .news-description { font-size: clamp(18px, 3vw, 32px); line-height: 1.6; color: #ccc; }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: #121225; border-top: 1px solid rgba(255,255,255,0.15); z-index: 100;
    position: relative;
  }
  .location-info { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
  .location-name { font-size: 22px; font-weight: 700; }
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 25px; }
  .progress-fill { height: 100%; background: #5ba8f5; width: 0%; transition: width 1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn.main-next { background: #5ba8f5; }

  .version-tag {
    position: absolute; bottom: 8px; right: 80px; /* さらに左へ */
    font-size: 10px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <div class="start-btn">タップして開始</div>
  <p style="margin-top:20px; color:#888;">Chromeでの自動翻訳と再生を準備します</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('camera')">Camera</button>
    <button class="mode-tab" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="playerContainer"></div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info">
    <span id="locationName">Waiting...</span>
    <span id="locationTime"></span>
  </div>
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 1.04</div>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, currentMode = 'camera', isPaused = false, progress = 0;
let cameras = [
  { city: "東京都庁展望台", tz: "Asia/Tokyo", id: "5U1uY0zYyks" },
  { city: "NASA Space Station", tz: "UTC", id: "21X5lGlDOfg" },
  { city: "Sky News Live", tz: "Europe/London", id: "9AuqUPW28s" },
  { city: "Africa Wildlife", tz: "Africa/Johannesburg", id: "FvFwYfT_OTo" },
  { city: "Tokyo Tower Live", tz: "Asia/Tokyo", id: "m6kXm_f3TfQ" }
];
let currentIndex = 0, cachedNews = [], newsIndex = 0;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('playerContainer', {
    height: '100%', width: '100%',
    playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
    events: { 'onReady': onPlayerReady, 'onError': onPlayerError }
  });
}

function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  if (player && player.playVideo) player.playVideo();
  showCamera();
  startTicker();
}

function onPlayerReady() { console.log("Ready"); }

function onPlayerError() { goNext(); }

function showCamera() {
  const cam = cameras[currentIndex % cameras.length];
  if (player && player.loadVideoById) {
    player.loadVideoById(cam.id);
    document.getElementById('locationName').textContent = cam.city;
  }
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => t.classList.toggle('active', (i===0 && mode==='camera') || (i===1 && mode==='news')));
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showCamera();
  resetProgress();
}

async function loadNews() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
  const data = await res.json();
  cachedNews = data.items;
  showNewsItem();
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p class="news-description">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
    <p style="margin-top:20px; color:#5ba8f5;">Article by BBC News</p>
  `;
}

function goNext() {
  if (currentMode === 'camera') { currentIndex++; showCamera(); }
  else { newsIndex++; showNewsItem(); }
  resetProgress();
}

function goPrev() {
  if (currentMode === 'camera') { currentIndex = (currentIndex - 1 + cameras.length) % cameras.length; showCamera(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
  resetProgress();
}

function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;'; }
function resetProgress() { progress = 0; }

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    progress += (100 / (currentMode === 'camera' ? 45 : 25));
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 1000);
}
</script>
</body>
</html>
