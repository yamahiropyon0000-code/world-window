<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.10</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 背景：ポンポン切り替わるように transition はあえて無し */
  #bgContainer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center; z-index: 1;
  }
  #bgOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.2); z-index: 2;
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 25px; background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(20px);
  }
  .app-title { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #fff; }
  .mode-tabs { display: flex; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
  .mode-tab {
    padding: 10px 20px; border-radius: 8px; border: none; background: transparent;
    color: #999; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; z-index: 10; }
  .news-container {
    width: 100%; height: 100%; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
  }

  footer {
    padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1);
  }
  .location-name { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
  #progressFill { 
    height: 100%; background: linear-gradient(90deg, #5ba8f5, #a78bfa); width: 0%; 
    transition: width 1s linear; /* バーを滑らかに動かす */
  }

  .controls { display: flex; align-items: center; justify-content: center; gap: 60px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 75px; height: 75px; border-radius: 50%; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; transform: scale(0.95); }

  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 11px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div id="bgContainer"></div>
<div id="bgOverlay"></div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name">World Tour...</div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background:#5ba8f5;" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.10</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;

// 100枚以上の超高画質プロフォトリスト (Unsplash厳選)
const photoList = [
  { n: "Shinjuku, Tokyo", id: "1540959733332-e94e270b2d42" },
  { n: "Manhattan, NY", id: "1496442226666-8d4d0e62e6e9" },
  { n: "Swiss Alps", id: "1531315630204-8c5299b41280" },
  { n: "Santorini, Greece", id: "1570077188670-e3a8d69ac5ff" },
  { n: "Venice, Italy", id: "1514890547357-a9ee2887ad8e" },
  { n: "Paris, France", id: "1502602898657-3e91760cbb34" },
  { n: "Kyoto, Japan", id: "1493976040374-85c8e12f0c0e" },
  { n: "London, UK", id: "1513635269975-59663e0ac1ad" },
  { n: "Banff, Canada", id: "1464822759023-fed622ff2c3b" },
  { n: "Seoul, Korea", id: "1538485399202-b94e2442ec56" },
  { n: "Dubai, UAE", id: "1512453973952-47405ac45440" },
  { n: "Hallstatt, Austria", id: "1516550893923-42d68ff46f45" },
  { n: "Golden Gate, SF", id: "1449034440478-56d70c2a52ac" },
  { n: "Iceland Waterfall", id: "1542332213-31f87348057f" },
  { n: "Singapore Skyline", id: "1528673327342-e130ae04b86d" },
  { n: "Amsterdam, NL", id: "1512411508247-230df5ea1d3b" },
  { n: "Machu Picchu, Peru", id: "1526392976046-0b5405642051" },
  { n: "Barcelona, Spain", id: "1539650116574-8ef122247444" },
  { n: "Rio de Janeiro, Brazil", id: "1483729558481-6eb3c403e612" },
  { n: "Lofoten, Norway", id: "1527267417152-5444e10176a1" },
  { n: "Cappadocia, Turkey", id: "1544376790-a548e65ec8d8" },
  { n: "Moscow, Russia", id: "1513326738637-29630e44a4d4" },
  { n: "Hanoi, Vietnam", id: "1528127269322-539801943592" },
  { n: "Sydney, Australia", id: "1506973035872-ad4159c4824b" },
  { n: "Grand Canyon, USA", id: "1473444475905-eb934f04178a" },
  { n: "Prague, Czech", id: "1541849548-20c3828304f7" },
  { n: "Rome, Italy", id: "1552832230-b076f1e0ef81" },
  { n: "Florence, Italy", id: "1504109586411-dc7bf837a647" },
  { n: "Cairo, Egypt", id: "1554652251-27715423f03b" },
  { n: "Antarctica", id: "1522067180436-749e797a7e8e" },
  { n: "Mount Everest", id: "1514336021237-77f6b97669d0" },
  { n: "Berlin, Germany", id: "1502444330042-53b05f6d6343" },
  { n: "Bangkok, Thailand", id: "1510443103936-442d3c66236a" },
  { n: "Bora Bora", id: "1507517508003-c45474699317" },
  { n: "Lake Como, Italy", id: "1534438327246-14bd3c757635" },
  { n: "Monument Valley, USA", id: "1504116212333-f1115b84c682" },
  { n: "Yosemite, USA", id: "1449467390506-6f14316626d0" },
  { n: "Cinque Terre, Italy", id: "1499678329046-29bb05836430" },
  { n: "Hawaii, USA", id: "1507575466041-ad35a78b30d3" },
  { n: "Osaka, Japan", id: "1542931419463-c60143fac551" }
];

let activeList = [...photoList];

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showPhoto() {
  const photo = activeList[currentIndex % activeList.length];
  const bg = document.getElementById('bgContainer');
  const imgUrl = `https://images.unsplash.com/photo-${photo.id}?auto=format&fit=crop&w=1600&q=80`;
  
  document.getElementById('locationName').textContent = photo.n;
  bg.style.backgroundImage = `url('${imgUrl}')`;
}

function goNext() {
  updateProgress(0); 
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  updateProgress(0);
  if (currentMode === 'photo') { currentIndex = (currentIndex - 1 + activeList.length) % activeList.length; showPhoto(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
}

function updateProgress(val) {
  progress = val;
  const fill = document.getElementById('progressFill');
  fill.style.transition = val === 0 ? 'none' : 'width 1s linear';
  fill.style.width = val + '%';
}

async function loadNews() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
  const data = await res.json();
  cachedNews = data.items;
  showNewsItem();
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 style="font-size:clamp(32px, 5vw, 60px); font-weight:800; line-height:1.2;">${item.title}</h1>
    <p style="font-size:clamp(18px, 3vw, 32px); line-height:1.6; color:#ccc; margin-top:30px;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
  document.getElementById('locationName').textContent = "World News Report";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  updateProgress(0);
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

setInterval(() => {
  if (isPaused) return;
  const limit = (currentMode === 'photo' ? 45 : 25);
  let nextProgress = progress + (100 / limit);
  if (nextProgress >= 105) { goNext(); } else { updateProgress(nextProgress); }
}, 1000);

shuffleArray(activeList);
showPhoto();
</script>
</body>
</html>
