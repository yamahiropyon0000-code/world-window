<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Window Pro ver 3.0.3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background-color: #000;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    background-color: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
  }

  .start-btn {
    padding: 22px 60px;
    background-color: #5ba8f5;
    color: #fff;
    border-radius: 50px;
    font-size: 24px;
    font-weight: 800;
    border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.2);
  }

  .start-sub {
    color: #555;
    font-size: 14px;
    margin-top: 16px;
  }

  header, footer {
    position: relative;
    z-index: 100;
    flex-shrink: 0;
    background-color: #0a0a0a;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    border-bottom: 1px solid #1a1a1a;
  }

  .app-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .mode-tabs {
    display: flex;
    gap: 6px;
    background-color: #222;
    border-radius: 10px;
    padding: 3px;
  }

  .mode-tab {
    padding: 8px 18px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .mode-tab.active {
    background-color: #fff;
    color: #000;
  }

  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
    background-color: #000;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .news-container {
    position: absolute;
    inset: 0;
    background-color: #000;
    display: none;
    flex-direction: column;
    padding: 60px 40px;
    justify-content: center;
    z-index: 20;
    overflow-y: auto;
  }

  .news-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 25px;
    color: #fff;
  }

  .news-desc {
    font-size: 24px;
    line-height: 1.6;
    color: #ccc;
  }

  .news-link {
    display: inline-block;
    margin-top: 30px;
    color: #5ba8f5;
    font-size: 20px;
    text-decoration: none;
    border-bottom: 2px solid #5ba8f5;
    width: fit-content;
  }

  footer {
    padding: 25px 40px;
    padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    border-top: 1px solid #1a1a1a;
  }

  .location-name {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    min-height: 1.2em;
    margin-bottom: 15px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background-color: #1a1a1a;
    border-radius: 3px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  #progressFill {
    height: 100%;
    background: #5ba8f5;
    width: 0%;
    transition: width 0.1s linear;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .ctrl-btn {
    background-color: #222;
    border: none;
    color: #fff;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .play-pause-btn {
    width: 85px;
    height: 85px;
    font-size: 34px;
    background-color: #5ba8f5;
  }

  #loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    color: #555;
    display: none;
    z-index: 30;
    text-align: center;
  }

  .version-tag {
    position: absolute;
    bottom: 8px;
    right: 120px;
    font-size: 10px;
    color: #333;
  }

  .photo-count {
    position: absolute;
    bottom: 8px;
    left: 40px;
    font-size: 10px;
    color: #333;
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">旅を開始する</button>
  <p class="start-sub">世界100箇所以上の名所を収集します</p>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">絶景</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">ニュース</button>
  </div>
</header>

<div class="content" id="mainView">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">&#9198;</button>
    <button class="ctrl-btn play-pause-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" onclick="manualNext()">&#9197;</button>
  </div>
  <span class="photo-count" id="photoCount"></span>
  <div class="version-tag">ver 3.0.3</div>
</footer>

<script>
let currentMode = 'photo';
let isPaused = false;
let progress = 0;
let currentIndex = 0;
let cachedNews = [];
let newsIndex = 0;
let nextImage = new Image();
let nextReady = false;
let loadedPhotos = [];
let tickerId = null;
let newsLoaded = false;

const locations = [
  { c: "日本", t: "東京", s: "東京タワー", w: "Tokyo_Tower" },
  { c: "日本", t: "京都", s: "金閣寺", w: "Kinkaku-ji" },
  { c: "日本", t: "富士山", s: "富士山", w: "Mount_Fuji" },
  { c: "中国", t: "北京", s: "万里の長城", w: "Great_Wall_of_China" },
  { c: "フランス", t: "パリ", s: "エッフェル塔", w: "Eiffel_Tower" },
  { c: "イタリア", t: "ローマ", s: "コロッセオ", w: "Colosseum" },
  { c: "エジプト", t: "ギザ", s: "大ピラミッド", w: "Great_Pyramid_of_Giza" },
  { c: "スペイン", t: "バルセロナ", s: "サグラダ・ファミリア", w: "Sagrada_Fam%C3%ADlia" },
  { c: "ギリシャ", t: "アテネ", s: "パルテノン神殿", w: "Parthenon" },
  { c: "アメリカ", t: "ニューヨーク", s: "自由の女神", w: "Statue_of_Liberty" },
  { c: "イギリス", t: "ロンドン", s: "ビッグ・ベン", w: "Big_Ben" }
];

const els = {
  startOverlay: document.getElementById('startOverlay'),
  startBtn: document.querySelector('#startOverlay .start-btn'),
  mainView: document.getElementById('mainView'),
  locationName: document.getElementById('locationName'),
  photoCount: document.getElementById('photoCount'),
  progressFill: document.getElementById('progressFill'),
  loader: document.getElementById('loader'),
  newsContainer: document.getElementById('newsContainer'),
  newsContent: document.getElementById('newsContent'),
  pauseBtn: document.getElementById('pauseBtn'),
  tabPhoto: document.getElementById('tabPhoto'),
  tabNews: document.getElementById('tabNews')
};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function formatCaption(loc) {
  if (!loc) return "";
  const parts = [];
  if (loc.c) parts.push(loc.c);
  if (loc.t && loc.t !== loc.c) parts.push(loc.t);
  if (loc.s) parts.push(loc.s);
  return parts.join(" / ");
}

function normalizeWikiTitle(slug) {
  return decodeURIComponent(slug).replace(/_/g, ' ');
}

function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || div.innerText || '';
}

function setProgress(value) {
  progress = Math.max(0, Math.min(100, value));
  els.progressFill.style.width = progress + '%';
}

function getCurrentPhoto() {
  if (!loadedPhotos.length) return null;
  return loadedPhotos[currentIndex % loadedPhotos.length];
}

function setPhotoBackground(url) {
  els.mainView.style.backgroundImage = url ? `url("${url}")` : 'none';
}

async function fetchWikiImages(entries) {
  const batchSize = 50;

  for (let i = 0; i < entries.length; i += batchSize) {
    const batch = entries.slice(i, i + batchSize);
    const titleMap = new Map();

    for (const entry of batch) {
      titleMap.set(normalizeWikiTitle(entry.w), entry);
    }

    const titles = batch.map(e => normalizeWikiTitle(e.w)).join('|');

    try {
      const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles).replace(/%7C/g, '|')}&prop=pageimages&format=json&pithumbsize=1600&origin=*`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.query || !data.query.pages) continue;

      const pages = data.query.pages;
      for (const pageId in pages) {
        const page = pages[pageId];
        const entry = titleMap.get(page.title);
        if (entry && page.thumbnail && page.thumbnail.source) {
          entry.imgUrl = page.thumbnail.source;
        }
      }
    } catch (e) {
      console.warn('Wiki API failed:', e);
    }
  }
}

async function initApp() {
  els.startBtn.textContent = '収集完了...';
  els.startOverlay.style.cursor = 'default';
  els.startOverlay.onclick = null;

  await fetchWikiImages(locations);
  loadedPhotos = locations.filter(e => e.imgUrl);
  shuffle(loadedPhotos);

  els.startOverlay.style.display = 'none';

  if (loadedPhotos.length === 0) {
    els.locationName.textContent = '画像を取得できませんでした';
    els.photoCount.textContent = '0 / 0';
    return;
  }

  showCurrentPhoto();
  preloadNext();
  startTicker();
}

function showCurrentPhoto() {
  const loc = getCurrentPhoto();
  if (!loc) return;

  setPhotoBackground(loc.imgUrl);
  els.locationName.textContent = formatCaption(loc);
  els.photoCount.textContent = `${(currentIndex % loadedPhotos.length) + 1} / ${loadedPhotos.length}`;
}

function preloadNext() {
  if (!loadedPhotos.length) {
    nextReady = false;
    return;
  }

  const nextLoc = loadedPhotos[(currentIndex + 1) % loadedPhotos.length];
  nextReady = false;
  nextImage = new Image();
  nextImage.onload = () => {
    nextReady = true;
  };
  nextImage.onerror = () => {
    nextReady = false;
  };
  nextImage.src = nextLoc.imgUrl;
}

function showPhotoAt(index) {
  if (!loadedPhotos.length) return;

  isPaused = true;
  updatePauseIcon();
  setProgress(0);

  currentIndex = (index + loadedPhotos.length) % loadedPhotos.length;

  const loc = getCurrentPhoto();
  if (!loc) return;

  setPhotoBackground('');
  els.locationName.textContent = '';
  els.loader.style.display = 'block';

  const temp = new Image();
  temp.onload = () => {
    els.loader.style.display = 'none';
    showCurrentPhoto();
    preloadNext();
    isPaused = false;
    updatePauseIcon();
  };
  temp.onerror = () => {
    els.loader.style.display = 'none';
    els.locationName.textContent = '画像の読み込みに失敗しました';
    isPaused = false;
    updatePauseIcon();
  };
  temp.src = loc.imgUrl;
}

function attemptAutoNext() {
  if (currentMode === 'news') {
    newsIndex++;
    showNewsItem();
    setProgress(0);
    return;
  }

  if (!loadedPhotos.length) return;

  if (nextReady) {
    currentIndex = (currentIndex + 1) % loadedPhotos.length;
    showCurrentPhoto();
    preloadNext();
    setProgress(0);
  } else {
    setProgress(100);
  }
}

function manualNext() {
  if (currentMode === 'news') {
    newsIndex++;
    showNewsItem();
    setProgress(0);
    return;
  }

  if (!loadedPhotos.length) return;
  showPhotoAt(currentIndex + 1);
}

function manualPrev() {
  if (currentMode === 'news') {
    newsIndex = (newsIndex - 1 + cachedNews.length) % Math.max(cachedNews.length, 1);
    showNewsItem();
    setProgress(0);
    return;
  }

  if (!loadedPhotos.length) return;
  showPhotoAt(currentIndex - 1);
}

async function loadNews() {
  if (newsLoaded && cachedNews.length) {
    showNewsItem();
    return;
  }

  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = Array.isArray(data.items) ? data.items : [];
    newsLoaded = true;
    showNewsItem();
  } catch (e) {
    els.newsContent.innerHTML = "<h1 class='news-title'>News load failed.</h1>";
  }
}

function showNewsItem() {
  if (!cachedNews.length) {
    els.newsContent.innerHTML = "<h1 class='news-title'>No news available.</h1>";
    els.locationName.textContent = "世界ニュース速報 (BBC)";
    return;
  }

  const item = cachedNews[((newsIndex % cachedNews.length) + cachedNews.length) % cachedNews.length];
  const title = item.title || '';
  const desc = stripHtml(item.description || '').trim();
  const shortDesc = desc.length > 300 ? desc.substring(0, 300) + '...' : desc;

  els.newsContent.innerHTML = '';

  const titleEl = document.createElement('h1');
  titleEl.className = 'news-title';
  titleEl.textContent = title;

  const descEl = document.createElement('p');
  descEl.className = 'news-desc';
  descEl.textContent = shortDesc;

  const linkEl = document.createElement('a');
  linkEl.className = 'news-link';
  linkEl.target = '_blank';
  linkEl.rel = 'noopener noreferrer';
  linkEl.href = item.link || '#';
  linkEl.textContent = '記事を詳しく読む →';

  els.newsContent.appendChild(titleEl);
  els.newsContent.appendChild(descEl);
  if (item.link) {
    els.newsContent.appendChild(linkEl);
  }

  els.locationName.textContent = "世界ニュース速報 (BBC)";
  els.photoCount.textContent = `${((newsIndex % cachedNews.length) + cachedNews.length) % cachedNews.length + 1} / ${cachedNews.length}`;
}

function switchMode(mode) {
  currentMode = mode;

  els.tabPhoto.classList.toggle('active', mode === 'photo');
  els.tabNews.classList.toggle('active', mode === 'news');
  els.newsContainer.style.display = mode === 'news' ? 'flex' : 'none';

  if (mode === 'news') {
    setPhotoBackground('');
    loadNews();
  } else {
    showCurrentPhoto();
    els.photoCount.textContent = loadedPhotos.length
      ? `${(currentIndex % loadedPhotos.length) + 1} / ${loadedPhotos.length}`
      : '0 / 0';
  }

  setProgress(0);
}

function togglePause() {
  isPaused = !isPaused;
  updatePauseIcon();
}

function updatePauseIcon() {
  els.pauseBtn.innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function startTicker() {
  if (tickerId !== null) return;

  tickerId = setInterval(() => {
    if (isPaused) return;

    const duration = currentMode === 'photo' ? 45 : 25;

    if (progress >= 100) {
      if (currentMode === 'news' || nextReady) {
        attemptAutoNext();
      }
      return;
    }

    setProgress(progress + (10 / duration));
  }, 100);
}
</script>
</body>
</html>
