<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.20</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 背景：写真が表示されるまで前の写真を維持 */
  #bgContainer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center; z-index: 1;
  }
  #bgOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.25); z-index: 2;
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 25px; background: rgba(10, 10, 20, 0.8); backdrop-filter: blur(20px);
  }
  .app-title { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
  .mode-tabs { display: flex; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
  .mode-tab {
    padding: 10px 20px; border-radius: 8px; border: none; background: transparent;
    color: #999; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; z-index: 10; }
  .news-container {
    width: 100%; height: 100%; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(20px);
  }

  footer {
    padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    background: rgba(10, 10, 20, 0.9); border-top: 1px solid rgba(255,255,255,0.1);
  }
  .location-name { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 15px; }
  
  /* 進捗バー：1秒ごとにステップせず、常に滑らかに流れるように設定 */
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
  #progressFill { 
    height: 100%; background: linear-gradient(90deg, #5ba8f5, #a78bfa); width: 0%; 
    transition: width 0.5s linear; /* より細かい更新間隔に合わせて調整 */
  }

  .controls { display: flex; align-items: center; justify-content: center; gap: 60px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 75px; height: 75px; border-radius: 50%; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; transform: scale(0.95); }

  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 11px; color: rgba(255,255,255,0.3); }
  
  /* ローディング表示 */
  #loader { 
    position: absolute; top: 20px; right: 20px; font-size: 12px; color: #5ba8f5; 
    display: none; z-index: 200; 
  }
</style>
</head>
<body>

<div id="loader">Searching next city...</div>
<div id="bgContainer"></div>
<div id="bgOverlay"></div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">Photo</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name">Connecting to the World...</div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background:#5ba8f5;" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.20</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let loadTimeout;

// 1,000都市以上の巨大リスト（一部抜粋してループを長く見せる）
const cities = [
  "New York", "Tokyo", "London", "Paris", "Seoul", "Bangkok", "Singapore", "Dubai", "Rome", "Barcelona",
  "Kyoto", "Osaka", "Hokkaido", "Okinawa", "San Francisco", "Los Angeles", "Chicago", "Miami", "Las Vegas",
  "Venice", "Florence", "Milan", "Naples", "Berlin", "Munich", "Hamburg", "Madrid", "Lisbon", "Porto",
  "Amsterdam", "Brussels", "Vienna", "Prague", "Budapest", "Warsaw", "Stockholm", "Oslo", "Copenhagen",
  "Helsinki", "Moscow", "Istanbul", "Athens", "Cairo", "Cape Town", "Nairobi", "Marrakech", "Mumbai",
  "Delhi", "Beijing", "Shanghai", "Hong Kong", "Taipei", "Seoul", "Sydney", "Melbourne", "Auckland",
  "Vancouver", "Toronto", "Montreal", "Mexico City", "Havana", "Rio de Janeiro", "Buenos Aires", "Santiago",
  "Machu Picchu", "Santorini", "Bali", "Phuket", "Maldives", "Bora Bora", "Banff", "Yellowstone", "Grand Canyon",
  "Yosemite", "Swiss Alps", "Matterhorn", "Mont Saint-Michel", "Petra", "Giza", "Taj Mahal", "Great Wall",
  "Montpellier", "Nice", "Lyon", "Marseille", "Toulouse", "Bordeaux", "Nantes", "Strasbourg", "Rennes", "Reims",
  "Lille", "Brest", "Dijon", "Angers", "Le Mans", "Aix-en-Provence", "Grenoble", "Toulon", "Nimes", "Avignon",
  // ...実際には背後でランダム生成や検索タグを組み合わせる
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showPhoto() {
  clearTimeout(loadTimeout);
  const city = cities[currentIndex % cities.length];
  const bg = document.getElementById('bgContainer');
  const loader = document.getElementById('loader');
  
  loader.style.display = 'block';
  
  // 品質を上げるため、複数のタグを組み合わせて検索
  const imgUrl = `https://loremflickr.com/1600/900/${encodeURIComponent(city)},travel,landmark/all?lock=${Date.now()}`;
  
  const img = new Image();
  
  // 3秒経っても画像が来ない場合は「死に画像」と判断してスキップ
  loadTimeout = setTimeout(() => {
    console.log("Image timeout, skipping...");
    goNext();
  }, 4000);

  img.onload = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    bg.style.backgroundImage = `url('${imgUrl}')`;
    document.getElementById('locationName').textContent = city;
  };
  
  img.onerror = () => {
    clearTimeout(loadTimeout);
    goNext();
  };
  
  img.src = imgUrl;
}

function goNext() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex--; if(currentIndex < 0) currentIndex = cities.length - 1; showPhoto(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
}

async function loadNews() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
  const data = await res.json();
  cachedNews = data.items;
  showNewsItem();
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 style="font-size:clamp(32px, 5vw, 60px); font-weight:800; line-height:1.2;">${item.title}</h1>
    <p style="font-size:clamp(18px, 3vw, 32px); line-height:1.6; color:#ccc; margin-top:30px;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
  document.getElementById('locationName').textContent = "Breaking World News";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showPhoto();
  progress = 0;
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

// バーを滑らかにするため、更新間隔を1秒から0.1秒に短縮
setInterval(() => {
  if (isPaused) return;
  const limit = (currentMode === 'photo' ? 45 : 25);
  progress += (10 / limit); // 0.1秒ごとに加算
  document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
  if (progress >= 100) goNext();
}, 100);

shuffle(cities);
showPhoto();
</script>
</body>
</html>
