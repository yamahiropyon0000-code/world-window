<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.29</title>
<style>
  /* 赤色を完全に追放。漆黒を徹底 */
  * { margin: 0; padding: 0; box-sizing: border-box; background-color: transparent; }
  html, body {
    background-color: #000 !important; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #000 !important; display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 22px 60px; background-color: #5ba8f5 !important; color: #fff !important;
    border-radius: 50px; font-size: 24px; font-weight: 800; border: none;
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; background-color: #0a0a0a !important; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #1a1a1a; }
  .app-title { font-size: 20px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background-color: #222 !important; border-radius: 10px; padding: 3px; }
  .mode-tab { padding: 8px 18px; border-radius: 7px; border: none; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; }
  .mode-tab.active { background-color: #fff !important; color: #000 !important; }

  .content { 
    flex: 1; position: relative; overflow: hidden; background-color: #000 !important;
    background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;
  }

  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #000 !important; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 20;
  }
  .news-title { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; }
  .news-link { display: inline-block; margin-top: 30px; color: #5ba8f5 !important; font-size: 20px; text-decoration: none; border-bottom: 2px solid #5ba8f5; }

  footer { padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px)); border-top: 1px solid #1a1a1a; }
  .location-name { font-size: 26px; font-weight: 800; color: #fff; min-height: 1.2em; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  
  .progress-bar { width: 100%; height: 6px; background-color: #1a1a1a !important; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
  #progressFill { height: 100%; background: #5ba8f5 !important; width: 0%; transition: width 0.1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn { background-color: #222 !important; border: none; color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; }
  .ctrl-btn:active { background-color: #5ba8f5 !important; }

  #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; color: #444; display: none; z-index: 30; }
  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 10px; color: #333; }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">旅を開始する</button>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">絶景</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">ニュース</button>
  </div>
</header>

<div class="content" id="mainView">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="manualPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background-color:#5ba8f5 !important;" onclick="manualNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.29</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let nextImage = new Image(), nextReady = false;

// 撮影年(year)を追加。古い写真用の検索キーワードも調整。
const locations = [
  { country: "フランス", city: "パリ", spot: "エッフェル塔", year: "1889", en: "Paris,Eiffel,1889" },
  { country: "日本", city: "東京", spot: "銀座", year: "1930", en: "Ginza,Tokyo,1930" },
  { country: "アメリカ", city: "ニューヨーク", spot: "タイムズスクエア", year: "1950", en: "NewYork,TimesSquare,1950" },
  { country: "イギリス", city: "ロンドン", spot: "ビッグ・ベン", en: "London,BigBen" },
  { country: "イタリア", city: "ベネチア", spot: "サン・マルコ広場", en: "Venice,SanMarco" },
  { country: "日本", city: "京都", spot: "伏見稲荷大社", en: "Kyoto,Fushimi" },
  { country: "エジプト", city: "ギザ", spot: "ピラミッド", year: "1920", en: "Giza,Pyramid,old" },
  { country: "ドイツ", city: "ベルリン", spot: "ブランデンブルク門", year: "1945", en: "Berlin,1945" },
  { country: "ブラジル", city: "リオデジャネイロ", spot: "コルコバードのキリスト像", en: "Rio,Christ" },
  { country: "ギリシャ", city: "サントリーニ島", spot: "イアの街並み", en: "Santorini,Oia" },
  { country: "シンガポール", city: "シンガポール", spot: "マリーナベイ・サンズ", en: "Singapore,MarinaBay" },
  { country: "タイ", city: "バンコク", spot: "ワット・アルン", en: "Bangkok,WatArun" },
  { country: "日本", city: "大阪", spot: "道頓堀", year: "1970", en: "Osaka,Dotonbori,1970" },
  { country: "チェコ", city: "プラハ", spot: "カレル橋", year: "1910", en: "Prague,CharlesBridge,old" },
  { country: "アメリカ", city: "サンフランシスコ", spot: "ゴールデンゲートブリッジ", year: "1937", en: "SanFrancisco,Bridge,1937" }
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function formatLocation(loc) {
  if (!loc) return "";
  let parts = [];
  if (loc.country) parts.push(loc.country);
  if (loc.city && loc.city !== loc.country) parts.push(loc.city);
  if (loc.spot) parts.push(loc.spot);
  let caption = parts.join(" / ");
  if (loc.year) caption += ` / ${loc.year}`;
  return caption;
}

function getImageUrl(loc) {
  // 検索ヒット率を上げるためキーワードを整理
  return `https://loremflickr.com/1600/1200/${encodeURIComponent(loc.en)}/all?lock=${Math.floor(Math.random() * 99999)}`;
}

function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  shuffle(locations);
  currentIndex = 0;
  loadFirstPhoto();
  startTicker();
}

function loadFirstPhoto() {
  const loc = locations[currentIndex % locations.length];
  const imgUrl = getImageUrl(loc);
  const tempImg = new Image();
  tempImg.onload = () => {
    document.getElementById('mainView').style.backgroundImage = `url('${imgUrl}')`;
    document.getElementById('locationName').textContent = formatLocation(loc);
    preloadNext();
  };
  tempImg.src = imgUrl;
}

function preloadNext() {
  nextReady = false;
  const nextLoc = locations[(currentIndex + 1) % locations.length];
  const url = getImageUrl(nextLoc);
  nextImage = new Image();
  nextImage.onload = () => { nextReady = true; };
  nextImage.src = url;
}

// 自動切り替え：バーが100%になり、かつ準備ができている時のみ
function autoNext() {
  if (currentMode === 'news') {
    newsIndex++;
    showNewsItem();
    progress = 0;
    return;
  }
  
  if (nextReady) {
    currentIndex++;
    const loc = locations[currentIndex % locations.length];
    document.getElementById('mainView').style.backgroundImage = `url('${nextImage.src}')`;
    document.getElementById('locationName').textContent = formatLocation(loc);
    progress = 0;
    preloadNext();
  } else {
    // 準備がまだならバーを100%で止めて待機（カクつき防止）
    progress = 100;
  }
}

// 手動切り替え（＞）：即座に黒画面にし、バーを止めてロード開始
function manualNext() {
  isPaused = true;
  progress = 0;
  document.getElementById('progressFill').style.width = '0%';
  
  if (currentMode === 'news') {
    newsIndex++;
    showNewsItem();
    isPaused = false;
    return;
  }

  const contentArea = document.getElementById('mainView');
  const nameLabel = document.getElementById('locationName');
  const loader = document.getElementById('loader');

  contentArea.style.backgroundImage = 'none';
  nameLabel.textContent = '';
  loader.style.display = 'block';

  currentIndex++;
  const loc = locations[currentIndex % locations.length];
  const url = getImageUrl(loc);
  const tempImg = new Image();
  tempImg.onload = () => {
    loader.style.display = 'none';
    contentArea.style.backgroundImage = `url('${url}')`;
    nameLabel.textContent = formatLocation(loc);
    isPaused = false;
    preloadNext();
  };
  tempImg.src = url;
}

function manualPrev() {
  currentIndex = (currentIndex - 1 + locations.length) % locations.length;
  manualNext();
}

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) { document.getElementById('newsContent').innerHTML = "<h1>News load failed.</h1>"; }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p style="font-size:24px; line-height:1.6; color:#ccc;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
    <a href="${item.link}" class="news-link" target="_blank">記事を詳しく読む →</a>
  `;
  document.getElementById('locationName').textContent = "世界ニュース速報 (BBC)";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') {
    document.getElementById('mainView').style.backgroundImage = 'none';
    loadNews();
  } else {
    manualNext();
  }
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    const limit = (currentMode === 'photo' ? 45 : 25);
    
    if (progress >= 100) {
      if (nextReady || currentMode === 'news') {
        autoNext();
      }
      return;
    }
    
    progress += (10 / limit);
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
  }, 100);
}
</script>
</body>
</html>
