<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 2.25</title>
<style>
  /* 基本設定：赤を一切使わず、漆黒で統一 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; /* 完全な黒 */
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn {
    padding: 22px 60px; background: #5ba8f5; color: #fff;
    border-radius: 50px; font-size: 24px; font-weight: 800; border: none;
    box-shadow: 0 0 40px rgba(91, 168, 245, 0.2);
  }

  header, footer { position: relative; z-index: 100; flex-shrink: 0; background: #0a0a0a; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 25px; border-bottom: 1px solid #1a1a1a;
  }
  .app-title { font-size: 20px; font-weight: 700; color: #fff; }
  .mode-tabs { display: flex; gap: 6px; background: #222; border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #888; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  /* メイン：常に黒背景を維持 */
  .content { 
    flex: 1; position: relative; overflow: hidden;
    background-color: #000;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
  }

  #loader { position: absolute; bottom: 20px; right: 20px; font-size: 14px; color: #444; display: none; }

  /* ニュースコンテナ */
  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 20;
  }
  .news-title { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.2; margin-bottom: 25px; }
  .news-link { 
    display: inline-block; margin-top: 30px; color: #5ba8f5; 
    text-decoration: none; font-size: 20px; font-weight: 600; 
    border-bottom: 2px solid #5ba8f5; padding-bottom: 4px;
    align-self: flex-start;
  }

  footer {
    padding: 25px 40px; padding-bottom: calc(25px + env(safe-area-inset-bottom, 20px));
    border-top: 1px solid #1a1a1a;
  }
  .location-name { font-size: 26px; font-weight: 800; color: #fff; min-height: 1.2em; margin-bottom: 15px; }
  
  .progress-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
  #progressFill { height: 100%; background: #5ba8f5; width: 0%; transition: width 0.1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: #222; border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { background: #5ba8f5; }

  .version-tag { position: absolute; bottom: 8px; right: 120px; font-size: 10px; color: #333; }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <button class="start-btn">TAP TO START TOUR</button>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabPhoto" onclick="switchMode('photo')">絶景</button>
    <button class="mode-tab" id="tabNews" onclick="switchMode('news')">ニュース</button>
  </div>
</header>

<div class="content">
  <div id="loader">Now Loading...</div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div id="locationName" class="location-name"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn" style="background:#5ba8f5;" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 2.25</div>
</footer>

<script>
let currentMode = 'photo', isPaused = false, progress = 0;
let currentIndex = 0, cachedNews = [], newsIndex = 0;
let loadTimeout;

const locations = [
  { cityEn: "Paris", cityJa: "パリ", countryJa: "フランス" },
  { cityEn: "Tokyo", cityJa: "東京", countryJa: "日本" },
  { cityEn: "London", cityJa: "ロンドン", countryJa: "イギリス" },
  { cityEn: "New York", cityJa: "ニューヨーク", countryJa: "アメリカ" },
  { cityEn: "Venice", cityJa: "ベネチア", countryJa: "イタリア" },
  { cityEn: "Kyoto", cityJa: "京都", countryJa: "日本" },
  { cityEn: "Rome", cityJa: "ローマ", countryJa: "イタリア" },
  { cityEn: "Barcelona", cityJa: "バルセロナ", countryJa: "スペイン" },
  { cityEn: "Dubai", cityJa: "ドバイ", countryJa: "UAE" },
  { cityEn: "Seoul", cityJa: "ソウル", countryJa: "韓国" },
  { cityEn: "Singapore", cityJa: "シンガポール", countryJa: "シンガポール" },
  { cityEn: "Bangkok", cityJa: "バンコク", countryJa: "タイ" },
  { cityEn: "Prague", cityJa: "プラハ", countryJa: "チェコ" },
  { cityEn: "Vienna", cityJa: "ウィーン", countryJa: "オーストリア" },
  { cityEn: "Amsterdam", cityJa: "アムステルダム", countryJa: "オランダ" },
  { cityEn: "Lisbon", cityJa: "リスボン", countryJa: "ポルトガル" },
  { cityEn: "Santorini", cityJa: "サントリーニ島", countryJa: "ギリシャ" },
  { cityEn: "Swiss Alps", cityJa: "スイス・アルプス", countryJa: "スイス" },
  { cityEn: "Banff", cityJa: "バンフ", countryJa: "カナダ" },
  { cityEn: "Sydney", cityJa: "シドニー", countryJa: "オーストラリア" },
  { cityEn: "Hong Kong", cityJa: "香港", countryJa: "中国" },
  { cityEn: "Florence", cityJa: "フィレンツェ", countryJa: "イタリア" },
  { cityEn: "Istanbul", cityJa: "イスタンブール", countryJa: "トルコ" },
  { cityEn: "Rio de Janeiro", cityJa: "リオデジャネイロ", countryJa: "ブラジル" },
  { cityEn: "Machu Picchu", cityJa: "マチュピチュ", countryJa: "ペルー" },
  { cityEn: "Hanoi", cityJa: "ハノイ", countryJa: "ベトナム" },
  { cityEn: "Bali", cityJa: "バリ島", countryJa: "インドネシア" },
  { cityEn: "Maldives", cityJa: "モルディブ", countryJa: "モルディブ" },
  { cityEn: "Berlin", cityJa: "ベルリン", countryJa: "ドイツ" },
  { cityEn: "Copenhagen", cityJa: "コペンハーゲン", countryJa: "デンマーク" }
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  shuffle(locations);
  showPhoto();
  startTicker();
}

function showPhoto() {
  clearTimeout(loadTimeout);
  const loc = locations[currentIndex % locations.length];
  const contentArea = document.querySelector('.content');
  const nameLabel = document.getElementById('locationName');
  const loader = document.getElementById('loader');

  // 【重要】読み込み開始時は画像と文字を完全に消して黒にする
  contentArea.style.backgroundImage = 'none';
  nameLabel.textContent = ''; 
  loader.style.display = 'block';

  const tags = ["architecture", "landscape", "street", "landmark"];
  const randomTag = tags[Math.floor(Math.random() * tags.length)];
  const imgUrl = `https://loremflickr.com/1600/1200/${encodeURIComponent(loc.cityEn)},${randomTag}/all?lock=${Date.now()}`;
  
  const img = new Image();
  loadTimeout = setTimeout(() => { goNext(); }, 6000); // タイムアウトは少し長めに

  img.onload = () => {
    clearTimeout(loadTimeout);
    loader.style.display = 'none';
    contentArea.style.backgroundImage = `url('${imgUrl}')`;
    nameLabel.textContent = `${loc.countryJa} / ${loc.cityJa}`;
  };
  
  img.onerror = () => {
    clearTimeout(loadTimeout);
    goNext();
  };
  
  img.src = imgUrl;
}

function goNext() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex++; showPhoto(); }
  else { newsIndex++; showNewsItem(); }
}

function goPrev() {
  progress = 0;
  if (currentMode === 'photo') { currentIndex = (currentIndex - 1 + locations.length) % locations.length; showPhoto(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
}

async function loadNews() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
    const data = await res.json();
    cachedNews = data.items;
    showNewsItem();
  } catch(e) { document.getElementById('newsContent').innerHTML = "<h1>News load failed.</h1>"; }
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  // 記事へのリンクを復活
  document.getElementById('newsContent').innerHTML = `
    <h1 class="news-title">${item.title}</h1>
    <p style="font-size:24px; line-height:1.6; color:#ccc;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
    <a href="${item.link}" class="news-link" target="_blank">記事を詳しく読む →</a>
  `;
  document.getElementById('locationName').textContent = "世界ニュース速報 (BBC)";
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('tabNews').classList.toggle('active', mode === 'news');
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') {
    document.querySelector('.content').style.backgroundImage = 'none';
    loadNews();
  } else {
    showPhoto();
  }
  progress = 0;
}

function togglePause() { 
  isPaused = !isPaused; 
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
}

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    const limit = (currentMode === 'photo' ? 45 : 25);
    progress += (10 / limit);
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 100);
}
</script>
</body>
</html>
