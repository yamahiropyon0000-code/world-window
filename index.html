<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>World Window Pro ver 1.07</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
  }

  /* 開始オーバーレイ */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 26, 0.98);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; cursor: pointer;
  }
  .start-btn { padding: 20px 50px; background: #5ba8f5; color: #fff; border-radius: 50px; font-size: 26px; font-weight: 700; }

  /* エラー通知（さらに目立つように） */
  #errorStatus {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; color: #ff6b6b; z-index: 100; display: none; width: 85%;
    background: rgba(0,0,0,0.8); padding: 30px; border: 2px solid #ff6b6b; border-radius: 20px;
  }

  header, footer { flex-shrink: 0; z-index: 100; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 25px; background: rgba(20, 20, 40, 0.9); backdrop-filter: blur(15px);
  }
  .mode-tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; }
  .mode-tab {
    padding: 8px 18px; border-radius: 7px; border: none; background: transparent;
    color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .mode-tab.active { background: #fff; color: #000; }

  .content { flex: 1; position: relative; overflow: hidden; background: #000; }
  #playerContainer { width: 100%; height: 100%; pointer-events: none; }

  .news-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a1a; display: none; flex-direction: column;
    padding: 60px 40px; justify-content: center; z-index: 10;
  }

  footer {
    padding: 20px 40px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 15px));
    background: #121225; border-top: 1px solid rgba(255,255,255,0.15); position: relative;
  }
  .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 25px; }
  .progress-fill { height: 100%; background: #5ba8f5; width: 0%; transition: width 1s linear; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
  .ctrl-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    width: 70px; height: 70px; border-radius: 50%; font-size: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .main-next { background: #5ba8f5; }

  .version-tag {
    position: absolute; bottom: 8px; right: 120px; /* さらに左へ */
    font-size: 10px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="startOverlay" onclick="initApp()">
  <div class="start-btn">タップして開始</div>
</div>

<header translate="no">
  <span class="app-title">World Window</span>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('camera')">Camera</button>
    <button class="mode-tab" onclick="switchMode('news')">News</button>
  </div>
</header>

<div class="content">
  <div id="errorStatus">
    <h2 style="margin-bottom:15px;">動画の読み込みに失敗しました</h2>
    <p id="errorDetail" style="font-size:18px; line-height:1.5;">YouTubeがこのドメインでの再生をブロックしています。<br>「次へ」ボタンで別の動画を試してください。</p>
    <button onclick="goNext()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:#5ba8f5; color:#fff;">手動で次へ進む</button>
  </div>
  <div id="playerContainer"></div>
  <div id="newsContainer" class="news-container" lang="en">
    <div id="newsContent"></div>
  </div>
</div>

<footer translate="no">
  <div class="location-info" style="margin-bottom:12px;">
    <span id="locationName" style="font-size:22px; font-weight:700;">Waiting...</span>
  </div>
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="goPrev()">&#9664;</button>
    <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
    <button class="ctrl-btn main-next" onclick="goNext()">&#9654;</button>
  </div>
  <div class="version-tag">ver 1.07</div>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, currentMode = 'camera', isPaused = false, progress = 0;
// 極めて一般的な（制限の少ない）風景動画に一旦差し替え
const videos = [
  { city: "Iceland Landscapes", id: "pWb9S-G7mIc" },
  { city: "Switzerland Mountains", id: "7v_vT8t80Yk" },
  { city: "Ocean Relaxation", id: "m6kXm_f3TfQ" },
  { city: "Tokyo Walk", id: "3j-Y9mOudbw" }
];
let currentIndex = 0, cachedNews = [], newsIndex = 0;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('playerContainer', {
    height: '100%', width: '100%',
    playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
    events: { 'onReady': () => console.log("API Ready"), 'onError': onPlayerError }
  });
}

function initApp() {
  document.getElementById('startOverlay').style.display = 'none';
  showVideo();
  startTicker();
}

function onPlayerError(e) {
  // 自動スキップを廃止し、一時停止してユーザーに知らせる
  isPaused = true;
  document.getElementById('errorStatus').style.display = 'block';
  console.log("YouTube Error Code:", e.data);
}

function showVideo() {
  const vid = videos[currentIndex % videos.length];
  if (player && player.loadVideoById) {
    document.getElementById('errorStatus').style.display = 'none';
    isPaused = false;
    player.loadVideoById(vid.id);
    document.getElementById('locationName').textContent = vid.city;
  }
}

function goNext() {
  if (currentMode === 'camera') { currentIndex++; showVideo(); }
  else { newsIndex++; showNewsItem(); }
  resetProgress();
}

function goPrev() {
  if (currentMode === 'camera') { currentIndex = (currentIndex - 1 + videos.length) % videos.length; showVideo(); }
  else { newsIndex = Math.max(0, newsIndex - 1); showNewsItem(); }
  resetProgress();
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').innerHTML = isPaused ? '&#9654;' : '&#10074;&#10074;';
  if (player && player.pauseVideo) { if (isPaused) player.pauseVideo(); else player.playVideo(); }
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('newsContainer').style.display = (mode === 'news') ? 'flex' : 'none';
  if (mode === 'news') loadNews(); else showVideo();
  resetProgress();
}

async function loadNews() {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml");
  const data = await res.json();
  cachedNews = data.items;
  showNewsItem();
}

function showNewsItem() {
  if (!cachedNews.length) return;
  const item = cachedNews[newsIndex % cachedNews.length];
  document.getElementById('newsContent').innerHTML = `
    <h1 style="font-size:clamp(32px, 5vw, 60px); margin-bottom:20px;">${item.title}</h1>
    <p style="font-size:clamp(18px, 3vw, 32px); color:#ccc;">${item.description.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
  `;
}

function resetProgress() { progress = 0; }

function startTicker() {
  setInterval(() => {
    if (isPaused) return;
    progress += (100 / (currentMode === 'camera' ? 45 : 25));
    document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) goNext();
  }, 1000);
}
</script>
</body>
</html>
